<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Life · 8TH 文宣印刷品總覽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Noto Sans TC', sans-serif; }
    body {
      background: #e8e4de;
      background-image:
        linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      overflow-x: auto;
    }
    #root { min-height: 100vh; }

    /* Toolbar */
    .dc-toolbar {
      position: sticky; top: 0; z-index: 100;
      background: #1a1410; border-bottom: 1px solid rgba(196,162,74,0.25);
      padding: 0 20px; height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .dc-toolbar-title { color: #ede1c8; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
    .dc-toolbar-meta { color: rgba(196,162,74,0.7); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
    .dc-toolbar-right { display: flex; align-items: center; gap: 16px; }
    .dc-toolbar-badge {
      background: rgba(196,162,74,0.12); border: 1px solid rgba(196,162,74,0.3);
      color: #c4a24a; font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
      padding: 3px 10px; border-radius: 999px; text-transform: uppercase;
    }

    /* Canvas */
    .dc-canvas { padding: 40px 40px 80px; min-width: max-content; }

    /* Section */
    .dc-section { margin-bottom: 64px; }
    .dc-section-header { margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid rgba(58,42,29,0.18); }
    .dc-section-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px; font-weight: 500; color: #1a1410; letter-spacing: 0.04em;
    }
    .dc-section-subtitle { margin-top: 4px; font-size: 11px; color: rgba(58,42,29,0.55); letter-spacing: 0.04em; }
    .dc-section-count { font-size: 10px; color: rgba(196,162,74,0.8); font-weight: 700; letter-spacing: 0.2em; margin-top: 2px; }

    /* Artboard row */
    .dc-row { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }

    /* Artboard */
    .dc-artboard { display: flex; flex-direction: column; gap: 8px; }
    .dc-artboard-label {
      font-size: 10px; font-weight: 600; color: rgba(58,42,29,0.55);
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0 2px;
    }
    .dc-artboard-dims { font-size: 9px; color: rgba(58,42,29,0.35); letter-spacing: 0.06em; margin-top: 1px; }
    .dc-artboard-frame {
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.2);
      background: transparent;
      display: flex;
      gap: 16px;
    }
    .dc-artboard-frame:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.25); }
    .dc-artboard-footer {
      display: flex; align-items: center; justify-content: space-between;
    }

    /* Focus overlay */
    .dc-focus-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(10, 8, 5, 0.92);
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
      overflow: auto;
    }
    .dc-focus-inner {
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .dc-focus-close {
      position: fixed; top: 16px; right: 20px;
      background: rgba(196,162,74,0.15); border: 1px solid rgba(196,162,74,0.3);
      color: #c4a24a; font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      padding: 6px 14px; border-radius: 999px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; text-transform: uppercase;
    }
    .dc-focus-close:hover { background: rgba(196,162,74,0.25); }
    .dc-focus-label {
      font-size: 11px; color: rgba(196,162,74,0.7); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .dc-artboard-frame.dc-zoom { cursor: zoom-in; }
    .dc-artboard-frame.dc-zoom:hover::after {
      content: '⤢ 放大';
      position: absolute; top: 8px; right: 8px;
      background: rgba(10,8,5,0.7); color: #c4a24a;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; font-family: 'Noto Sans TC', sans-serif;
      padding: 4px 8px; border-radius: 4px; pointer-events: none;
      z-index: 10;
    }

    /* Download button */
    .dc-dl-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(196,162,74,0.12); border: 1px solid rgba(196,162,74,0.4);
      color: #c4a24a; font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      padding: 5px 14px; border-radius: 999px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .dc-dl-btn:hover:not(:disabled) { background: rgba(196,162,74,0.22); border-color: rgba(196,162,74,0.65); }
    .dc-dl-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .dc-dl-progress {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1410; border: 1px solid rgba(196,162,74,0.35);
      color: #c4a24a; font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      padding: 10px 22px; border-radius: 999px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      z-index: 9999; font-family: 'Noto Sans TC', sans-serif;
      display: flex; align-items: center; gap: 10px;
    }
    .dc-dl-spinner {
      width: 14px; height: 14px; border: 2px solid rgba(196,162,74,0.25);
      border-top-color: #c4a24a; border-radius: 50%;
      animation: dlspin 0.7s linear infinite;
    }
    @keyframes dlspin { to { transform: rotate(360deg); } }

    /* Printing frames style */
    .print-iframe {
      border: none;
      background: transparent;
      display: block;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback } = React;

/* ─── mm → px helper (1 mm = 3.7795 px at 96 dpi) ─── */
const mm = (n) => Math.round(n * 3.7795);

/* ═══════════════════════════════════════════════
   Design Canvas — section + artboard scaffold
═══════════════════════════════════════════════ */
function DCSection({ title, subtitle, count, children }) {
  return (
    <div className="dc-section">
      <div className="dc-section-header">
        <div className="dc-section-title">{title}</div>
        {subtitle && <div className="dc-section-subtitle">{subtitle}</div>}
        {count && <div className="dc-section-count">{count}</div>}
      </div>
      <div className="dc-row">{children}</div>
    </div>
  );
}

function DCArtboard({ label, dims, children, scale }) {
  const [focused, setFocused] = useState(false);

  return (
    <>
      <div className="dc-artboard">
        <div className="dc-artboard-footer">
          <div>
            <div className="dc-artboard-label">{label}</div>
            {dims && <div className="dc-artboard-dims">{dims}</div>}
          </div>
        </div>
        <div
          className="dc-artboard-frame dc-zoom"
          style={scale ? { transform: `scale(${scale})`, transformOrigin: 'top left', marginBottom: `calc(${scale * 100 - 100}% - ${(1-scale)*0}px)` } : {}}
          onClick={() => setFocused(true)}
        >
          {children}
        </div>
      </div>

      {focused && (
        <div className="dc-focus-overlay" onClick={() => setFocused(false)}>
          <div className="dc-focus-inner" onClick={e => e.stopPropagation()}>
            <button className="dc-focus-close" onClick={() => setFocused(false)}>ESC · 關閉</button>
            <div className="dc-focus-label">{label}{dims ? ` · ${dims}` : ''}</div>
            <div style={{ overflow: 'auto', maxWidth: '95vw', maxHeight: '90vh', display: 'flex', gap: 20 }}>
              {children}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ═══════════════════════════════════════════════
   Main App
═══════════════════════════════════════════════ */
function PrintApp() {
  const [dlState, setDlState] = useState({ running: false, current: 0, total: 0 });

  const downloadAll = useCallback(async () => {
    const artboards = document.querySelectorAll('.dc-artboard');
    const total = artboards.length;
    setDlState({ running: true, current: 0, total });

    const zip = new JSZip();
    const { jsPDF } = window.jspdf;

    for (let i = 0; i < artboards.length; i++) {
      const ab = artboards[i];
      const labelEl = ab.querySelector('.dc-artboard-label');
      const label = labelEl ? labelEl.textContent.trim() : `artboard-${i + 1}`;
      
      const iframes = ab.querySelectorAll('.dc-artboard-frame iframe');
      setDlState({ running: true, current: i + 1, total });

      const isDigital = label.includes('Digital') || label.includes('電子') || label.includes('20 ·');

      if (isDigital) {
        // 數位輸出：導出為 PNG
        for (let j = 0; j < iframes.length; j++) {
          const iframe = iframes[j];
          const suffix = iframes.length > 1 ? (j === 0 ? '_front' : '_back') : '';
          const filename = `${String(i + 1).padStart(2, '0')}_${label.replace(/[\/\\:*?"<>|·‧]/g, '_').replace(/\s+/g, '_')}${suffix}.png`;

          try {
            const targetDoc = iframe.contentDocument || iframe.contentWindow.document;
            const renderTarget = targetDoc.getElementById('root').firstElementChild;
            
            if (!renderTarget) {
              console.warn(`Target not found in iframe for ${filename}`);
              continue;
            }

            const canvas = await html2canvas(renderTarget, {
              scale: 2,
              useCORS: true,
              allowTaint: true,
              logging: false,
              backgroundColor: null,
            });
            const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
            if (blob) zip.file(filename, blob);
          } catch (e) {
            console.warn(`Skip ${filename}:`, e);
          }
        }
      } else {
        // 印刷物：導出為 PDF (多面合併為多頁)
        const filename = `${String(i + 1).padStart(2, '0')}_${label.replace(/[\/\\:*?"<>|·‧]/g, '_').replace(/\s+/g, '_')}.pdf`;
        let pdfInstance = null;

        for (let j = 0; j < iframes.length; j++) {
          const iframe = iframes[j];
          
          // 獲取 iframe 尺寸以決定 PDF 頁面大小 (mm)
          const styleWidth = iframe.style.width || `${iframe.offsetWidth}px`;
          const styleHeight = iframe.style.height || `${iframe.offsetHeight}px`;
          const widthMm = Math.round(parseFloat(styleWidth) / 3.7795) || 210;
          const heightMm = Math.round(parseFloat(styleHeight) / 3.7795) || 297;
          const orientation = widthMm > heightMm ? 'l' : 'p';

          try {
            const targetDoc = iframe.contentDocument || iframe.contentWindow.document;
            const renderTarget = targetDoc.getElementById('root').firstElementChild;
            
            if (!renderTarget) {
              console.warn(`Target not found in iframe for ${filename} page ${j + 1}`);
              continue;
            }

            // 使用 scale: 3 以利高品質印刷
            const canvas = await html2canvas(renderTarget, {
              scale: 3,
              useCORS: true,
              allowTaint: true,
              logging: false,
              backgroundColor: null,
            });
            
            const imgData = canvas.toDataURL('image/jpeg', 0.95);

            if (!pdfInstance) {
              pdfInstance = new jsPDF({
                orientation: orientation,
                unit: 'mm',
                format: [widthMm, heightMm]
              });
            } else {
              pdfInstance.addPage([widthMm, heightMm], orientation);
            }

            pdfInstance.addImage(imgData, 'JPEG', 0, 0, widthMm, heightMm);
          } catch (e) {
            console.warn(`Skip page ${j + 1} of ${filename}:`, e);
          }
        }

        if (pdfInstance) {
          const pdfBlob = pdfInstance.output('blob');
          zip.file(filename, pdfBlob);
        }
      }
    }

    const content = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = '8TH_印刷品總覽.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    setDlState({ running: false, current: 0, total: 0 });
  }, []);

  return (
    <div>
      {/* Toolbar */}
      <div className="dc-toolbar">
        <div>
          <div className="dc-toolbar-title">Nexus Life · 八週年文宣印刷品</div>
          <div className="dc-toolbar-meta">台中市政店 · 8TH ANNIVERSARY · 2026.04.25 — 05.31</div>
        </div>
        <div className="dc-toolbar-right">
          <div className="dc-toolbar-badge">19 件印刷物</div>
          <div className="dc-toolbar-badge">Mark Journal</div>
          <button
            className="dc-dl-btn"
            disabled={dlState.running}
            onClick={downloadAll}
          >
            ↓ 下載全套 (PDF/PNG)
          </button>
          <div style={{ color: 'rgba(196,162,74,0.5)', fontSize: 10, letterSpacing: '0.08em' }}>點擊任一印件可放大</div>
        </div>
      </div>

      {/* Progress toast */}
      {dlState.running && (
        <div className="dc-dl-progress">
          <div className="dc-dl-spinner" />
          正在截圖 {dlState.current} / {dlState.total} · 請稍候
        </div>
      )}

      {/* Canvas */}
      <div className="dc-canvas">

        {/* 01–08 主路集印點立牌 */}
        <DCSection
          title="01–08 · 集印點立牌 主路"
          subtitle="A4 210 × 297 mm · 8 站 · 館內主動線陳列 · 銅版紙 200gsm 建議"
          count="8 件 / 19"
        >
          {[
            { id: '01', area: '靈感補給站', el: '無限' },
            { id: '02', area: '日常儀式感', el: '陶杯' },
            { id: '03', area: '都市放空點', el: '風' },
            { id: '04', area: '白日夢實驗室', el: '橡實' },
            { id: '05', area: '打卡神級背景', el: '書' },
            { id: '06', area: '放鬆充電站', el: '咖啡' },
            { id: '07', area: '絕美光影濾鏡', el: '光點' },
            { id: '08', area: '情報交流道', el: '花朵' }
          ].map(s => (
            <DCArtboard
              key={s.id}
              label={`${s.id} · ${s.area} ‧ ${s.el}`}
              dims="A4 · 210 × 297 mm"
            >
              <iframe
                src={`printings/standee.html?id=${s.id}`}
                style={{ width: `${mm(210)}px`, height: `${mm(297)}px` }}
                className="print-iframe"
                scrolling="no"
              />
            </DCArtboard>
          ))}
        </DCSection>

        {/* 09–11 隱蛋立牌 */}
        <DCSection
          title="09–11 · 集印點立牌 隱蛋 A · B · C"
          subtitle="A4 210 × 297 mm · 員工別針 / 戶外桌 / 電梯告示 · 找到才會出現的彩蛋"
          count="3 件 / 19"
        >
          {[
            { code: 'a', id: 'A', area: '夥伴' },
            { code: 'b', id: 'B', area: '野生小夥伴' },
            { code: 'c', id: 'C', area: '野生大夥伴' }
          ].map(e => (
            <DCArtboard
              key={e.id}
              label={`隱蛋 ${e.id} ‧ ${e.area}`}
              dims="A4 · 210 × 297 mm"
            >
              <iframe
                src={`printings/standee.html?id=${e.code}`}
                style={{ width: `${mm(210)}px`, height: `${mm(297)}px` }}
                className="print-iframe"
                scrolling="no"
              />
            </DCArtboard>
          ))}
        </DCSection>

        {/* 12 櫃檯說明立卡 */}
        <DCSection
          title="12 · 櫃檯說明立卡"
          subtitle="A4 210 × 297 mm · 服務台立式 L 型壓克力插卡使用"
          count="1 件 / 19"
        >
          <DCArtboard label="12 · Counter Info Card" dims="A4 · 210 × 297 mm">
            <iframe
              src="printings/counter-card.html"
              style={{ width: `${mm(210)}px`, height: `${mm(297)}px` }}
              className="print-iframe"
              scrolling="no"
            />
          </DCArtboard>
        </DCSection>

        {/* 13–14 獎品看板 */}
        <DCSection
          title="13 – 14 · 獎品看板（雙面）"
          subtitle="A4 210 × 297 mm · P1 主視覺 + P2 大獎詳情 · 高磅銅版紙建議"
          count="2 件 / 19"
        >
          <DCArtboard label="13 · P1 · Hero 主視覺" dims="A4 · 210 × 297 mm">
            <iframe
              src="printings/prize-board-hero.html"
              style={{ width: `${mm(210)}px`, height: `${mm(297)}px` }}
              className="print-iframe"
              scrolling="no"
            />
          </DCArtboard>
          <DCArtboard label="14 · P2 · 大獎詳情" dims="A4 · 210 × 297 mm">
            <iframe
              src="printings/prize-board-detail.html"
              style={{ width: `${mm(210)}px`, height: `${mm(297)}px` }}
              className="print-iframe"
              scrolling="no"
            />
          </DCArtboard>
        </DCSection>

        {/* 15–18 桌面卡 */}
        <DCSection
          title="15 – 18 · 桌面卡 A · B · C · D"
          subtitle="A6 105 × 148 mm · 雙面印刷 · 正面 ∞ · 背面四種風味註記"
          count="4 件 / 19"
        >
          {[
            { letter: 'a', title: 'A', line: '炙燒的香，先到。' },
            { letter: 'b', title: 'B', line: '鹽讓甜更明亮。'  },
            { letter: 'c', title: 'C', line: '胡椒留下尾韻。'  },
            { letter: 'd', title: 'D', line: '一點醬就夠。'    },
          ].map(t => (
            <DCArtboard
              key={t.letter}
              label={`${t.letter.toUpperCase()} · 桌面卡 ${t.title} · ${t.line}`}
              dims="A6 × 2 · 雙面 · 105 × 148 mm"
            >
              <iframe
                src={`printings/table-card-${t.letter}-front.html`}
                style={{ width: `${mm(105)}px`, height: `${mm(148)}px` }}
                className="print-iframe"
                scrolling="no"
              />
              <iframe
                src={`printings/table-card-${t.letter}-back.html`}
                style={{ width: `${mm(105)}px`, height: `${mm(148)}px` }}
                className="print-iframe"
                scrolling="no"
              />
            </DCArtboard>
          ))}
        </DCSection>

        {/* 19 主視覺海報 A4 */}
        <DCSection
          title="19 · 主視覺海報"
          subtitle="A4 直向 210 × 297 mm · 入口、電梯、展示位使用"
          count="1 件 / 19"
        >
          <DCArtboard label="19 · Main Visual · A4 210 × 297 mm" dims="A4 · 210 × 297 mm">
            <iframe
              src="printings/main-poster.html"
              style={{ width: `${mm(210)}px`, height: `${mm(297)}px` }}
              className="print-iframe"
              scrolling="no"
            />
          </DCArtboard>
        </DCSection>

        {/* 20 電子海報 1080×1920 */}
        <DCSection
          title="20 · 電子海報"
          subtitle="1080 × 1920 px · 9:16 直式 · 社群投放 / 數位看板使用"
          count="電子版 · 非印刷"
        >
          <DCArtboard label="20 · Digital Poster · 1080 × 1920 px" dims="1080 × 1920 px · 9:16">
            <div style={{
              width: `${Math.round(1080 * 0.28)}px`,
              height: `${Math.round(1920 * 0.28)}px`,
              overflow: 'hidden', position: 'relative', flexShrink: 0,
            }}>
              <iframe
                src="printings/digital-poster.html"
                style={{
                  width: '216mm',
                  height: '384mm',
                  border: 'none',
                  transform: 'scale(0.28)',
                  transformOrigin: 'top left',
                  position: 'absolute',
                  top: 0,
                  left: 0
                }}
                className="print-iframe"
                scrolling="no"
              />
            </div>
          </DCArtboard>
        </DCSection>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);
</script>
</body>
</html>
