<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Life · 8TH 文宣印刷品總覽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Noto Sans TC', sans-serif; }
    body {
      background: #e8e4de;
      background-image:
        linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      overflow-x: auto;
    }
    #root { min-height: 100vh; }

    /* Toolbar */
    .dc-toolbar {
      position: sticky; top: 0; z-index: 100;
      background: #1a1410; border-bottom: 1px solid rgba(196,162,74,0.25);
      padding: 0 20px; height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .dc-toolbar-title { color: #ede1c8; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
    .dc-toolbar-meta { color: rgba(196,162,74,0.7); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
    .dc-toolbar-right { display: flex; align-items: center; gap: 16px; }
    .dc-toolbar-badge {
      background: rgba(196,162,74,0.12); border: 1px solid rgba(196,162,74,0.3);
      color: #c4a24a; font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
      padding: 3px 10px; border-radius: 999px; text-transform: uppercase;
    }

    /* Canvas */
    .dc-canvas { padding: 40px 40px 80px; min-width: max-content; }

    /* Section */
    .dc-section { margin-bottom: 64px; }
    .dc-section-header { margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid rgba(58,42,29,0.18); }
    .dc-section-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px; font-weight: 500; color: #1a1410; letter-spacing: 0.04em;
    }
    .dc-section-subtitle { margin-top: 4px; font-size: 11px; color: rgba(58,42,29,0.55); letter-spacing: 0.04em; }
    .dc-section-count { font-size: 10px; color: rgba(196,162,74,0.8); font-weight: 700; letter-spacing: 0.2em; margin-top: 2px; }

    /* Artboard row */
    .dc-row { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }

    /* Artboard */
    .dc-artboard { display: flex; flex-direction: column; gap: 8px; }
    .dc-artboard-label {
      font-size: 10px; font-weight: 600; color: rgba(58,42,29,0.55);
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0 2px;
    }
    .dc-artboard-dims { font-size: 9px; color: rgba(58,42,29,0.35); letter-spacing: 0.06em; margin-top: 1px; }
    .dc-artboard-frame {
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.2);
    }
    .dc-artboard-frame:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.25); }
    .dc-artboard-footer {
      display: flex; align-items: center; justify-content: space-between;
    }

    /* Focus overlay */
    .dc-focus-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(10, 8, 5, 0.92);
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
      overflow: auto;
    }
    .dc-focus-inner {
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .dc-focus-close {
      position: fixed; top: 16px; right: 20px;
      background: rgba(196,162,74,0.15); border: 1px solid rgba(196,162,74,0.3);
      color: #c4a24a; font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      padding: 6px 14px; border-radius: 999px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; text-transform: uppercase;
    }
    .dc-focus-close:hover { background: rgba(196,162,74,0.25); }
    .dc-focus-label {
      font-size: 11px; color: rgba(196,162,74,0.7); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .dc-artboard-frame.dc-zoom { cursor: zoom-in; }
    .dc-artboard-frame.dc-zoom:hover::after {
      content: '⤢ 放大';
      position: absolute; top: 8px; right: 8px;
      background: rgba(10,8,5,0.7); color: #c4a24a;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; font-family: 'Noto Sans TC', sans-serif;
      padding: 4px 8px; border-radius: 4px; pointer-events: none;
    }

    /* Download button */
    .dc-dl-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(196,162,74,0.12); border: 1px solid rgba(196,162,74,0.4);
      color: #c4a24a; font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      padding: 5px 14px; border-radius: 999px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .dc-dl-btn:hover:not(:disabled) { background: rgba(196,162,74,0.22); border-color: rgba(196,162,74,0.65); }
    .dc-dl-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .dc-dl-progress {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1410; border: 1px solid rgba(196,162,74,0.35);
      color: #c4a24a; font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      padding: 10px 22px; border-radius: 999px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      z-index: 9999; font-family: 'Noto Sans TC', sans-serif;
      display: flex; align-items: center; gap: 10px;
    }
    .dc-dl-spinner {
      width: 14px; height: 14px; border: 2px solid rgba(196,162,74,0.25);
      border-top-color: #c4a24a; border-radius: 50%;
      animation: dlspin 0.7s linear infinite;
    }
    @keyframes dlspin { to { transform: rotate(360deg); } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useEffect } = React;

/* ─── Inline-SVG helper (html2canvas compatible, replaces CSS mask) ─── */
const _svgCache = {};
async function _loadSvgMarkup(src, fill) {
  const key = `${src}::${fill}`;
  if (_svgCache[key]) return _svgCache[key];
  try {
    const text = await fetch(src).then(r => r.text());
    let svg = text.trim();
    svg = svg.replace(/<svg([^>]*)>/, (_, a) => {
      const attrs = a.replace(/\bfill="[^"]*"/g, '').replace(/\bstroke="[^"]*"/g, '');
      return `<svg${attrs} width="100%" height="100%" fill="${fill}" stroke="none">`;
    });
    _svgCache[key] = svg;
    return svg;
  } catch { return null; }
}
function useSvgInline(src, color) {
  const key = `${src}::${color}`;
  const [markup, setMarkup] = useState(_svgCache[key] || null);
  useEffect(() => {
    if (!src || _svgCache[key]) return;
    _loadSvgMarkup(src, color).then(m => { if (m) setMarkup(m); });
  }, [src, color]);
  return markup;
}

/* ─── mm → px helper (1 mm = 3.7795 px at 96 dpi) ─── */
const mm = (n) => Math.round(n * 3.7795);

/* ─── Print design tokens ─── */
const PRINT = {
  bg:        '#231a13',
  bgDeep:    '#15100b',
  bgInk:     '#0d0905',
  bgWarm:    '#2c211a',
  paper:     '#ede1c8',
  paperLt:   '#f5ead5',
  paperDim:  '#d9c9a7',
  gold:      '#c4a24a',
  goldLt:    '#d4b66a',
  goldDeep:  '#a08537',
  goldDim:   'rgba(196,162,74,0.55)',
  goldMute:  'rgba(196,162,74,0.32)',
  goldFaint: 'rgba(196,162,74,0.18)',
  goldHair:  'rgba(196,162,74,0.1)',
  red:       '#b94a3a',
  redDeep:   '#9a3a2c',
  redLt:     '#c75c4a',
  cream:     '#f0e4cc',
  creamDim:  'rgba(240,228,204,0.7)',
  creamMute: 'rgba(240,228,204,0.5)',
  creamFaint:'rgba(240,228,204,0.3)',
  brown:     '#3a2a1d',
  brownDim:  'rgba(58,42,29,0.7)',
};

/* ─── Typography atoms ─── */
function PMono({ children, color = PRINT.creamMute, size = 7, track = '0.32em', weight = 600, style: s }) {
  return (
    <span style={{
      fontFamily: "'Noto Sans TC',sans-serif",
      fontSize: `${size}pt`, letterSpacing: track, textTransform: 'uppercase',
      color, fontWeight: weight,
      fontVariantNumeric: 'tabular-nums', fontFeatureSettings: '"tnum","palt"',
      ...s,
    }}>{children}</span>
  );
}

function PSerif({ children, size = 16, weight = 400, italic, color = PRINT.cream, track = '0.04em', style: s }) {
  return (
    <span style={{
      fontFamily: "'Noto Serif TC',serif",
      fontSize: `${size}pt`, fontWeight: weight,
      fontStyle: italic ? 'italic' : 'normal',
      letterSpacing: track, color,
      fontFeatureSettings: '"palt"',
      ...s,
    }}>{children}</span>
  );
}

function PSans({ children, size = 10, weight = 400, color = PRINT.cream, track = '0.04em', style: s }) {
  return (
    <span style={{
      fontFamily: "'Noto Sans TC',sans-serif",
      fontSize: `${size}pt`, fontWeight: weight,
      letterSpacing: track, color,
      fontFeatureSettings: '"palt"',
      ...s,
    }}>{children}</span>
  );
}

/* ─── Gold gradient text ─── */
function GoldText({ children, soft = false, style: s, as: As = 'span' }) {
  const grad = soft
    ? 'linear-gradient(135deg, #8e6b22 0%, #c4a24a 50%, #8e6b22 100%)'
    : 'linear-gradient(135deg, #8e6b22 0%, #c4a24a 35%, #f0d684 50%, #c4a24a 65%, #8e6b22 100%)';
  return (
    <As style={{
      background: grad,
      WebkitBackgroundClip: 'text', backgroundClip: 'text',
      WebkitTextFillColor: 'transparent', color: 'transparent',
      ...s,
    }}>{children}</As>
  );
}

/* ─── Paper grain overlay ─── */
function PaperGrain({ opacity = 0.5 }) {
  return (
    <div style={{
      position: 'absolute', inset: 0, pointerEvents: 'none',
      backgroundImage: `
        url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E"),
        radial-gradient(circle at 20% 30%, rgba(196,162,74,0.04) 0.5px, transparent 1.5px),
        radial-gradient(circle at 80% 70%, rgba(196,162,74,0.05) 0.5px, transparent 1.5px)
      `,
      backgroundSize: '180px 180px, 70px 70px, 90px 90px',
      mixBlendMode: 'overlay', opacity,
    }} />
  );
}

/* ─── Corner ticks ─── */
function PTick({ pos, len = 6, color = PRINT.gold, opacity = 0.55, flipX, flipY, weight = 0.5 }) {
  const t = `${flipX ? 'scaleX(-1)' : ''} ${flipY ? 'scaleY(-1)' : ''}`.trim();
  return (
    <div style={{ position: 'absolute', ...pos, width: len, height: len, transform: t, opacity }}>
      <div style={{ position: 'absolute', top: 0, left: 0, width: len, height: weight, background: color }} />
      <div style={{ position: 'absolute', top: 0, left: 0, width: weight, height: len, background: color }} />
    </div>
  );
}

/* ─── Crop marks ─── */
function PCropMarks({ color = 'rgba(196,162,74,0.3)', len = 8, inset = 3 }) {
  const s = (pos) => ({ position: 'absolute', ...pos, background: color, pointerEvents: 'none' });
  return (
    <>
      <div style={s({ top: inset, left: inset, width: len, height: 0.5 })} />
      <div style={s({ top: inset, left: inset, width: 0.5, height: len })} />
      <div style={s({ top: inset, right: inset, width: len, height: 0.5 })} />
      <div style={s({ top: inset, right: inset, width: 0.5, height: len })} />
      <div style={s({ bottom: inset, left: inset, width: len, height: 0.5 })} />
      <div style={s({ bottom: inset, left: inset, width: 0.5, height: len })} />
      <div style={s({ bottom: inset, right: inset, width: len, height: 0.5 })} />
      <div style={s({ bottom: inset, right: inset, width: 0.5, height: len })} />
    </>
  );
}

/* ─── Page frame ─── */
function PPage({ wMm, hMm, bg, children, marks = true, grain = true, style: s }) {
  return (
    <div style={{
      width: `${wMm}mm`, height: `${hMm}mm`,
      background: bg || `linear-gradient(165deg, ${PRINT.bgWarm} 0%, ${PRINT.bg} 50%, ${PRINT.bgDeep} 100%)`,
      color: PRINT.cream,
      position: 'relative', overflow: 'hidden',
      fontFamily: "'Noto Sans TC',sans-serif",
      ...s,
    }}>
      {grain && <PaperGrain opacity={0.45} />}
      {children}
      {marks && <PCropMarks />}
    </div>
  );
}

/* ─── Thin rule ─── */
function PRule({ width = '24mm', color = PRINT.goldFaint, height = 0.5, style: s }) {
  return <div style={{ width, height, background: color, ...s }} />;
}

/* ─── Watermark ─── */
function PWatermark({ ch = '8', size = 480, color = 'rgba(196,162,74,0.05)', pos = { left: '50%', top: '50%' }, italic = false }) {
  return (
    <div style={{
      position: 'absolute', ...pos,
      transform: `translate(-50%, -50%) ${italic ? 'skewX(-6deg)' : ''}`,
      fontFamily: "'Noto Serif TC',serif",
      fontWeight: 500, fontSize: size, lineHeight: 0.78,
      color, letterSpacing: '-0.06em',
      pointerEvents: 'none', userSelect: 'none', whiteSpace: 'nowrap',
      fontStyle: italic ? 'italic' : 'normal',
    }}>{ch}</div>
  );
}

/* ─── Pill label ─── */
function PillLabel({ children, sparkle = true, size = 7, gap = 4, padding = '3pt 9pt' }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap,
      padding, border: `0.6pt solid ${PRINT.goldDim}`,
      background: 'rgba(196,162,74,0.04)',
      borderRadius: 999,
    }}>
      {sparkle && (
        <svg width={size + 1} height={size + 1} viewBox="0 0 16 16" style={{ flex: '0 0 auto' }}>
          <path d="M8 0 L9 6 L15 8 L9 10 L8 16 L7 10 L1 8 L7 6 Z" fill={PRINT.gold} />
          <circle cx="3" cy="3" r="0.8" fill={PRINT.gold} opacity="0.6"/>
          <circle cx="13" cy="13" r="0.8" fill={PRINT.gold} opacity="0.6"/>
        </svg>
      )}
      <PMono size={size} color={PRINT.gold} track="0.32em" weight={700}>{children}</PMono>
    </div>
  );
}

/* ─── Title block ─── */
function TitleBlock({ en = 'Mark Journal', zh = '集印探索', size = 1, align = 'center', italic = true }) {
  const fs = 36 * size;
  return (
    <div style={{
      display: 'flex', flexDirection: 'column',
      alignItems: align === 'left' ? 'flex-start' : (align === 'right' ? 'flex-end' : 'center'),
    }}>
      <div style={{
        fontFamily: "'Noto Serif TC',serif",
        fontSize: `${fs}pt`, fontWeight: 400, color: PRINT.cream,
        fontStyle: italic ? 'italic' : 'normal',
        letterSpacing: '0.01em', lineHeight: 1.05,
      }}>{en}</div>
      {zh && (
        <div style={{ marginTop: 4 * size,
          fontFamily: "'Noto Serif TC',serif", fontWeight: 300,
          fontSize: `${fs * 0.32}pt`,
          color: PRINT.creamDim, letterSpacing: '0.42em', paddingLeft: '0.4em',
        }}>{zh}</div>
      )}
    </div>
  );
}

/* ─── Icon mask (recolor SVG) — uses inline SVG for html2canvas compat ─── */
function PMaskIcon({ src, size = 40, color = PRINT.cream, opacity = 1, style: s }) {
  const markup = useSvgInline(src, color);
  const base = { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size, opacity, flexShrink: 0, ...s };
  if (markup) return <span style={base} dangerouslySetInnerHTML={{ __html: markup }} />;
  return (
    <span style={{
      ...base,
      backgroundColor: color,
      WebkitMaskImage: `url('${src}')`, WebkitMaskSize: 'contain',
      WebkitMaskRepeat: 'no-repeat', WebkitMaskPosition: 'center',
      maskImage: `url('${src}')`, maskSize: 'contain',
      maskRepeat: 'no-repeat', maskPosition: 'center',
    }} />
  );
}

/* ─── Infinity badge (double ring) ─── */
function InfinityBadge({ size = 80, fg = PRINT.gold, accent = PRINT.gold, stroke = 1.4, inner = true }) {
  const W = 200, H = 100;
  const r = 42, cy = 50, cx1 = 55, cx2 = 145;
  return (
    <svg width={size} height={size * (H / W)} viewBox={`0 0 ${W} ${H}`} overflow="visible">
      <circle cx={cx1} cy={cy} r={r + 5} fill="none" stroke={fg} strokeWidth={stroke * 0.4} opacity={0.32} />
      <circle cx={cx2} cy={cy} r={r + 5} fill="none" stroke={fg} strokeWidth={stroke * 0.4} opacity={0.32} />
      <circle cx={cx1} cy={cy} r={r} fill="none" stroke={fg} strokeWidth={stroke} strokeLinecap="round" />
      <circle cx={cx2} cy={cy} r={r} fill="none" stroke={fg} strokeWidth={stroke} strokeLinecap="round" />
      <g transform="translate(100 50)">
        <circle r={2.6} fill={accent} />
        {inner && <circle r={7} fill="none" stroke={accent} strokeWidth={0.6} opacity={0.5} />}
      </g>
    </svg>
  );
}

/* ─── Co-brand lockup ─── */
function PCoBrand({ height = 11, gap = 8 }) {
  const filt = 'brightness(0) invert(1) opacity(0.85)';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap }}>
      <img src="assets/tsutaya-logo.svg" alt="TSUTAYA"
        style={{ height: height * 1.1, filter: filt, display: 'block' }} />
      <span style={{ fontFamily: "'Noto Sans TC',sans-serif",
        fontSize: `${height * 0.85}pt`, color: PRINT.creamFaint }}>×</span>
      <img src="assets/wired-tokyo-logo.svg" alt="WIRED TOKYO"
        style={{ height: height * 1.25, filter: filt, display: 'block' }} />
    </div>
  );
}

/* ─── Nexus Life wordmark — uses inline SVG for html2canvas compat ─── */
function NexusWordmark({ width = 140, color = PRINT.cream, sub = true, align = 'center' }) {
  const markup = useSvgInline('assets/nexus-life-logo.svg', color);
  const aspect = 862.33 / 150.7;
  const h = width / aspect;
  return (
    <div style={{
      display: 'inline-flex', flexDirection: 'column',
      alignItems: align === 'left' ? 'flex-start' : (align === 'right' ? 'flex-end' : 'center'),
      gap: 4,
    }}>
      {markup
        ? <span style={{ display: 'block', width, height: h }} dangerouslySetInnerHTML={{ __html: markup }} />
        : <span style={{
            display: 'block', width, height: h,
            backgroundColor: color,
            WebkitMaskImage: `url('assets/nexus-life-logo.svg')`,
            WebkitMaskSize: 'contain', WebkitMaskRepeat: 'no-repeat', WebkitMaskPosition: 'center',
            maskImage: `url('assets/nexus-life-logo.svg')`,
            maskSize: 'contain', maskRepeat: 'no-repeat', maskPosition: 'center',
          }} />
      }
      {sub && (
        <div style={{
          fontFamily: "'Noto Sans TC',sans-serif",
          fontSize: `${Math.max(5, h * 0.22)}pt`, color: PRINT.creamDim,
          fontWeight: 600, letterSpacing: '0.42em',
          paddingLeft: '0.42em', lineHeight: 1.2,
        }}>
          8TH&nbsp;ANNIVERSARY
        </div>
      )}
    </div>
  );
}

/* ─── Nexus Life inline mark ─── */
function PNexusMark({ size = 1, align = 'center' }) {
  const fs = 28 * size;
  return (
    <div style={{
      display: 'inline-flex', flexDirection: 'column',
      alignItems: align === 'left' ? 'flex-start' : 'center',
    }}>
      <h1 style={{
        fontFamily: "'Noto Serif TC',serif",
        fontSize: `${fs}pt`, lineHeight: 0.88,
        letterSpacing: '-0.02em', fontWeight: 500,
        margin: 0, textAlign: align, color: PRINT.cream,
      }}>
        <GoldText>Nexus</GoldText>
        <span style={{ fontStyle: 'italic', color: PRINT.cream, fontWeight: 400 }}> Life.</span>
      </h1>
    </div>
  );
}

/* ─── Simulated QR code ─── */
function PBigQR({ size = '50mm', label, seed = 7, withBrackets = true }) {
  const N = 25;
  const cells = [];
  let s = seed;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) cells.push(rand() > 0.5);
  const setBlock = (cx, cy) => {
    for (let y = 0; y < 7; y++) for (let x = 0; x < 7; x++) {
      const edge = x===0||x===6||y===0||y===6;
      const inner = x>=2&&x<=4&&y>=2&&y<=4;
      cells[(cy+y)*N+(cx+x)] = edge||inner;
    }
    for (let y = -1; y < 8; y++) for (let x = -1; x < 8; x++) {
      if (x===-1||x===7||y===-1||y===7) {
        if (cx+x>=0&&cx+x<N&&cy+y>=0&&cy+y<N) cells[(cy+y)*N+(cx+x)] = false;
      }
    }
  };
  setBlock(0,0); setBlock(N-7,0); setBlock(0,N-7);
  for (let y = 0; y < 5; y++) for (let x = 0; x < 5; x++) {
    const edge = x===0||x===4||y===0||y===4;
    const inner = x===2&&y===2;
    cells[(N-7+y)*N+(N-7+x)] = edge||inner;
  }
  return (
    <div style={{
      width: size, height: size,
      background: `radial-gradient(circle at 30% 25%, ${PRINT.paperLt} 0%, ${PRINT.paper} 65%, ${PRINT.paperDim} 100%)`,
      padding: '4mm', position: 'relative',
      border: `0.6pt solid ${PRINT.goldDim}`,
      boxShadow: '0 1pt 2pt rgba(255,255,255,0.4) inset, 0 -1pt 2pt rgba(58,42,29,0.15) inset, 0 6mm 18mm -6mm rgba(0,0,0,0.55)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none', opacity: 0.35,
        backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E")`,
        mixBlendMode: 'multiply',
      }} />
      {withBrackets && (
        <>
          <PTick pos={{ top: '-1.5mm', left: '-1.5mm' }} len={9} color={PRINT.gold} opacity={0.85} weight={0.8} />
          <PTick pos={{ top: '-1.5mm', right: '-1.5mm' }} len={9} color={PRINT.gold} opacity={0.85} flipX weight={0.8} />
          <PTick pos={{ bottom: '-1.5mm', left: '-1.5mm' }} len={9} color={PRINT.gold} opacity={0.85} flipY weight={0.8} />
          <PTick pos={{ bottom: '-1.5mm', right: '-1.5mm' }} len={9} color={PRINT.gold} opacity={0.85} flipX flipY weight={0.8} />
        </>
      )}
      <svg width="100%" height="100%" viewBox={`0 0 ${N} ${N}`} style={{ display: 'block', position: 'relative' }}>
        {cells.map((on, i) => on && (
          <rect key={i} x={i%N} y={Math.floor(i/N)} width="1" height="1" fill={PRINT.brown}/>
        ))}
      </svg>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   Design Canvas — section + artboard scaffold
═══════════════════════════════════════════════ */
function DCSection({ title, subtitle, count, children }) {
  return (
    <div className="dc-section">
      <div className="dc-section-header">
        <div className="dc-section-title">{title}</div>
        {subtitle && <div className="dc-section-subtitle">{subtitle}</div>}
        {count && <div className="dc-section-count">{count}</div>}
      </div>
      <div className="dc-row">{children}</div>
    </div>
  );
}

function DCArtboard({ label, dims, children, scale }) {
  const [focused, setFocused] = useState(false);

  return (
    <>
      <div className="dc-artboard">
        <div className="dc-artboard-footer">
          <div>
            <div className="dc-artboard-label">{label}</div>
            {dims && <div className="dc-artboard-dims">{dims}</div>}
          </div>
        </div>
        <div
          className={`dc-artboard-frame dc-zoom`}
          style={scale ? { transform: `scale(${scale})`, transformOrigin: 'top left', marginBottom: `calc(${scale * 100 - 100}% - ${(1-scale)*0}px)` } : {}}
          onClick={() => setFocused(true)}
        >
          {children}
        </div>
      </div>

      {focused && (
        <div className="dc-focus-overlay" onClick={() => setFocused(false)}>
          <div className="dc-focus-inner" onClick={e => e.stopPropagation()}>
            <button className="dc-focus-close" onClick={() => setFocused(false)}>ESC · 關閉</button>
            <div className="dc-focus-label">{label}{dims ? ` · ${dims}` : ''}</div>
            <div style={{ overflow: 'auto', maxWidth: '90vw', maxHeight: '80vh' }}>
              {children}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ═══════════════════════════════════════════════
   Main App
═══════════════════════════════════════════════ */
function PrintApp() {
  const totalPieces = 19;
  const [dlState, setDlState] = useState({ running: false, current: 0, total: 0 });

  const downloadAll = useCallback(async () => {
    const artboards = document.querySelectorAll('.dc-artboard');
    const total = artboards.length;
    setDlState({ running: true, current: 0, total });

    const zip = new JSZip();

    for (let i = 0; i < artboards.length; i++) {
      const ab = artboards[i];
      const labelEl = ab.querySelector('.dc-artboard-label');
      const frameEl = ab.querySelector('.dc-artboard-frame');
      const label = labelEl ? labelEl.textContent.trim() : `artboard-${i + 1}`;
      const filename = `${String(i + 1).padStart(2, '0')}_${label.replace(/[\/\\:*?"<>|·‧]/g, '_').replace(/\s+/g, '_')}.png`;

      setDlState({ running: true, current: i + 1, total });

      try {
        // Brief pause so async SVG state (dangerouslySetInnerHTML) settles in DOM
        await new Promise(r => setTimeout(r, 80));
        const canvas = await html2canvas(frameEl, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          logging: false,
          backgroundColor: null,
        });
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        if (blob) zip.file(filename, blob);
      } catch (e) {
        console.warn(`Skip ${filename}:`, e);
      }
    }

    const content = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = '8TH_印刷品總覽.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    setDlState({ running: false, current: 0, total: 0 });
  }, []);

  return (
    <div>
      {/* Toolbar */}

          <div className="dc-toolbar-title">Nexus Life · 八週年文宣印刷品</div>

          <button

          <div style={{ color: 'rgba(196,162,74,0.5)', fontSize: 10, letterSpacing: '0.08em' }}>點擊任一印件可放大</div>
        </div>
      </div>

      {/* Progress toast */}
      {dlState.running && (

          正在截圖 {dlState.current} / {dlState.total} · 請稍候

      {/* Canvas */}
      <div className="dc-canvas">

        {/* 01–08 主路集印點立牌 */}
        <DCSection
          title="01–08 · 集印點立牌 主路"

              <StampStandee data={s} />

        </DCSection>

        {/* 09–11 隱蛋立牌 */}
