<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Life · 8TH 文宣印刷品總覽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: 'Noto Sans TC', sans-serif; }
    body {
      min-height: 100vh;
      background: #dedad3;
      background-image:
        linear-gradient(rgba(0,0,0,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.055) 1px, transparent 1px);
      background-size: 40px 40px;
      overflow-x: auto;
      overflow-y: auto;
    }
    #root { min-height: 100vh; }

    /* ─── Toolbar ─── */
    .dc-toolbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,10,6,0.97);
      border-bottom: 1px solid rgba(196,162,74,0.18);
      padding: 0 24px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 0 rgba(196,162,74,0.08), 0 4px 24px rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }
    .dc-toolbar-brand { display: flex; flex-direction: column; gap: 2px; }
    .dc-toolbar-title { color: #ede1c8; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
    .dc-toolbar-meta { color: rgba(196,162,74,0.55); font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; }
    .dc-toolbar-right { display: flex; align-items: center; gap: 10px; }
    .dc-toolbar-badge {
      background: rgba(196,162,74,0.09); border: 1px solid rgba(196,162,74,0.22);
      color: rgba(196,162,74,0.75); font-size: 10px; font-weight: 700;
      letter-spacing: 0.18em; padding: 3px 10px; border-radius: 999px;
      text-transform: uppercase; white-space: nowrap;
    }
    .dc-toolbar-divider { width: 1px; height: 20px; background: rgba(196,162,74,0.12); margin: 0 2px; }
    .dc-toolbar-hint { color: rgba(196,162,74,0.35); font-size: 10px; letter-spacing: 0.08em; white-space: nowrap; }

    /* ─── Canvas ─── */
    .dc-canvas { padding: 52px 52px 100px; min-width: max-content; }

    /* ─── Section ─── */
    .dc-section { margin-bottom: 76px; }
    .dc-section-header {
      margin-bottom: 28px;
      display: flex; align-items: stretch; gap: 0;
    }
    .dc-section-accent {
      width: 2px; flex-shrink: 0; border-radius: 2px;
      background: linear-gradient(to bottom, rgba(196,162,74,0.7), rgba(196,162,74,0.15));
      margin-right: 18px;
    }
    .dc-section-info {
      flex: 1;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(58,42,29,0.12);
    }
    .dc-section-title-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 6px;
    }
    .dc-section-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px; font-weight: 500; color: #1c1510; letter-spacing: 0.03em;
    }
    .dc-section-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .dc-section-type-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.2em;
      padding: 2px 9px; border-radius: 999px; text-transform: uppercase;
    }
    .dc-section-type-badge.print {
      background: rgba(196,162,74,0.1); border: 1px solid rgba(196,162,74,0.28);
      color: rgba(196,162,74,0.85);
    }
    .dc-section-type-badge.digital {
      background: rgba(100,180,220,0.1); border: 1px solid rgba(100,180,220,0.3);
      color: rgba(100,180,220,0.85);
    }
    .dc-section-count {
      font-size: 9px; color: rgba(58,42,29,0.38); font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
    }
    .dc-section-subtitle { font-size: 11px; color: rgba(58,42,29,0.48); letter-spacing: 0.04em; line-height: 1.65; }

    /* ─── Artboard row ─── */
    .dc-row { display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-start; }

    /* ─── Artboard ─── */
    .dc-artboard { display: flex; flex-direction: column; gap: 0; }
    .dc-artboard-header { margin-bottom: 9px; }
    .dc-artboard-label {
      font-size: 10px; font-weight: 600; color: rgba(58,42,29,0.55);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .dc-artboard-dims { font-size: 9px; color: rgba(58,42,29,0.32); letter-spacing: 0.06em; margin-top: 2px; }
    .dc-artboard-frame {
      position: relative;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.1),
        0 2px 8px rgba(0,0,0,0.18),
        0 8px 28px rgba(0,0,0,0.22),
        0 20px 56px rgba(0,0,0,0.14);
      background: #1a1108;
      display: flex;
      gap: 16px;
    }
    .dc-artboard-footer {
      margin-top: 10px;
      display: flex; align-items: center; justify-content: flex-end;
    }

    /* ─── Print content (capture target) ─── */
    .dc-print-content { flex-shrink: 0; display: block; }

    /* ─── Focus overlay (no animation) ─── */
    .dc-focus-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(8,5,3,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      padding: 32px; overflow: auto;
    }
    .dc-focus-inner {
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .dc-focus-close {
      position: fixed; top: 16px; right: 20px;
      background: rgba(196,162,74,0.1); border: 1px solid rgba(196,162,74,0.28);
      color: rgba(196,162,74,0.85); font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      padding: 6px 16px; border-radius: 999px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; text-transform: uppercase;
    }
    .dc-focus-close:hover {
      background: rgba(196,162,74,0.2); border-color: rgba(196,162,74,0.5);
      color: #c4a24a;
    }
    .dc-focus-label {
      font-size: 11px; color: rgba(196,162,74,0.55); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .dc-artboard-frame.dc-zoom { cursor: zoom-in; }

    /* ─── Toolbar download-all button ─── */
    .dc-dl-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(196,162,74,0.11); border: 1px solid rgba(196,162,74,0.32);
      color: #c4a24a; font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      padding: 6px 16px; border-radius: 999px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; text-transform: uppercase;
      white-space: nowrap;
    }
    .dc-dl-btn:hover:not(:disabled) {
      background: rgba(196,162,74,0.2); border-color: rgba(196,162,74,0.58);
    }
    .dc-dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Per-artboard download button ─── */
    .dc-dl-item-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(196,162,74,0.08); border: 1px solid rgba(196,162,74,0.25);
      color: rgba(196,162,74,0.85); font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; padding: 5px 16px; border-radius: 999px;
      cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
      text-transform: uppercase; white-space: nowrap;
    }
    .dc-dl-item-btn:hover:not(:disabled) {
      background: rgba(196,162,74,0.18); border-color: rgba(196,162,74,0.5);
      color: #c4a24a;
    }
    .dc-dl-item-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── Download progress toast (no slide animation) ─── */
    .dc-dl-progress {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #0e0a06; border: 1px solid rgba(196,162,74,0.28);
      color: #c4a24a; font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      padding: 12px 24px; border-radius: 999px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      z-index: 9999; font-family: 'Noto Sans TC', sans-serif;
      display: flex; align-items: center; gap: 12px;
    }
    .dc-dl-spinner {
      width: 14px; height: 14px; border: 2px solid rgba(196,162,74,0.2);
      border-top-color: #c4a24a; border-radius: 50%;
      animation: dlspin 0.7s linear infinite;
    }
    @keyframes dlspin { to { transform: rotate(360deg); } }
  </style>

  <!-- Real QR code library (qrcode-generator: pure browser, no bundler needed) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous"></script>

  <!-- ════════════════════════════════════════════════════════════
       Inlined print-common.js (window.PrintCommon component library)
       Modifications vs. /printings/common/print-common.js:
         · PPage no longer carries className 'dc-artboard-frame'
         · asset paths '../assets/' → 'assets/'
         · NexusWordmark uses <img> (html2canvas can't render CSS mask)
  ════════════════════════════════════════════════════════════ -->
  <script>
  (function() {
    const h = React.createElement;

    /* ─── mm → px helper (1 mm = 3.7795 px at 96 dpi) ─── */
    const mm = (n) => Math.round(n * 3.7795);

    /* ─── Print design tokens ─── */
    const PRINT = {
      bg:        '#1a1108',
      bgDeep:    '#0e0903',
      bgInk:     '#060401',
      bgWarm:    '#231508',
      paper:     '#ede1c8',
      paperLt:   '#f7eed8',
      paperDim:  '#d9c9a7',
      gold:      '#d4a843',
      goldLt:    '#e8c470',
      goldDeep:  '#b08830',
      goldDim:   'rgba(212,168,67,0.55)',
      goldMute:  'rgba(212,168,67,0.32)',
      goldFaint: 'rgba(212,168,67,0.18)',
      goldHair:  'rgba(212,168,67,0.1)',
      red:       '#d4543e',
      redDeep:   '#b03a28',
      redLt:     '#e06650',
      cream:     '#f4e8cc',
      creamDim:  'rgba(244,232,204,0.78)',
      creamMute: 'rgba(244,232,204,0.52)',
      creamFaint:'rgba(244,232,204,0.32)',
      brown:     '#f4e8cc',
      brownDim:  'rgba(244,232,204,0.7)',
    };

    /* ─── Typography atoms ─── */
    function PMono({ children, color, size, track, weight, style }) {
      return h('span', {
        style: {
          fontFamily: "'Noto Sans TC',sans-serif",
          fontSize: `${size !== undefined ? size : 7}pt`,
          letterSpacing: track || '0.32em',
          textTransform: 'uppercase',
          color: color || PRINT.brown,
          fontWeight: weight || 600,
          fontVariantNumeric: 'tabular-nums',
          fontFeatureSettings: '"tnum","palt"',
          ...style,
        }
      }, children);
    }

    function PSerif({ children, size, weight, italic, color, track, style }) {
      return h('span', {
        style: {
          fontFamily: "'Noto Serif TC',serif",
          fontSize: `${size !== undefined ? size : 16}pt`,
          fontWeight: weight || 400,
          fontStyle: italic ? 'italic' : 'normal',
          letterSpacing: track || '0.04em',
          color: color || PRINT.brown,
          fontFeatureSettings: '"palt"',
          ...style,
        }
      }, children);
    }

    function PSans({ children, size, weight, color, track, style }) {
      return h('span', {
        style: {
          fontFamily: "'Noto Sans TC',sans-serif",
          fontSize: `${size !== undefined ? size : 10}pt`,
          fontWeight: weight || 400,
          letterSpacing: track || '0.04em',
          color: color || PRINT.brown,
          fontFeatureSettings: '"palt"',
          ...style,
        }
      }, children);
    }

    /* ─── Gold text (solid color — background-clip:text unsupported by html2canvas) ─── */
    function GoldText({ children, soft, style, as }) {
      const As = as || 'span';
      return h(As, {
        style: {
          color: soft ? '#c4a24a' : '#d4a843',
          ...style,
        }
      }, children);
    }

    /* ─── Paper grain overlay ─── */
    function PaperGrain({ opacity }) {
      return h('div', {
        style: {
          position: 'absolute',
          inset: 0,
          pointerEvents: 'none',
          backgroundImage: `
            url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E"),
            radial-gradient(circle at 20% 30%, rgba(212,168,67,0.04) 0.5px, transparent 1.5px),
            radial-gradient(circle at 80% 70%, rgba(212,168,67,0.05) 0.5px, transparent 1.5px)
          `,
          backgroundSize: '180px 180px, 70px 70px, 90px 90px',
          mixBlendMode: 'overlay',
          opacity: opacity !== undefined ? opacity : 0.5,
        }
      });
    }

    /* ─── Corner ticks ─── */
    function PTick({ pos, len, color, opacity, flipX, flipY, weight }) {
      const t = `${flipX ? 'scaleX(-1)' : ''} ${flipY ? 'scaleY(-1)' : ''}`.trim();
      const l = len !== undefined ? len : 6;
      const w = weight !== undefined ? weight : 0.5;
      return h('div', {
        style: {
          position: 'absolute',
          ...pos,
          width: l,
          height: l,
          transform: t,
          opacity: opacity !== undefined ? opacity : 0.55,
        }
      }, [
        h('div', { key: 'h-tick', style: { position: 'absolute', top: 0, left: 0, width: l, height: w, background: color || PRINT.gold } }),
        h('div', { key: 'v-tick', style: { position: 'absolute', top: 0, left: 0, width: w, height: l, background: color || PRINT.gold } }),
      ]);
    }

    /* ─── Crop marks ─── */
    function PCropMarks({ color, len, inset }) {
      const c = color || 'rgba(196,162,74,0.3)';
      const l = len !== undefined ? len : 8;
      const i = inset !== undefined ? inset : 3;
      const s = (pos) => ({ position: 'absolute', ...pos, background: c, pointerEvents: 'none' });
      return h(React.Fragment, null, [
        h('div', { key: 'tl-h', style: s({ top: i, left: i, width: l, height: 0.5 }) }),
        h('div', { key: 'tl-v', style: s({ top: i, left: i, width: 0.5, height: l }) }),
        h('div', { key: 'tr-h', style: s({ top: i, right: i, width: l, height: 0.5 }) }),
        h('div', { key: 'tr-v', style: s({ top: i, right: i, width: 0.5, height: l }) }),
        h('div', { key: 'bl-h', style: s({ bottom: i, left: i, width: l, height: 0.5 }) }),
        h('div', { key: 'bl-v', style: s({ bottom: i, left: i, width: 0.5, height: l }) }),
        h('div', { key: 'br-h', style: s({ bottom: i, right: i, width: l, height: 0.5 }) }),
        h('div', { key: 'br-v', style: s({ bottom: i, right: i, width: 0.5, height: l }) }),
      ]);
    }

    /* ─── Page frame ─── */
    function PPage({ wMm, hMm, bg, children, marks, grain, style }) {
      const showMarks = marks !== undefined ? marks : true;
      const showGrain = grain !== undefined ? grain : true;
      return h('div', {
        style: {
          width: `${wMm}mm`,
          height: `${hMm}mm`,
          background: bg || `linear-gradient(160deg, ${PRINT.bgWarm} 0%, ${PRINT.bg} 50%, ${PRINT.bgDeep} 100%)`,
          color: PRINT.cream,
          position: 'relative',
          overflow: 'hidden',
          fontFamily: "'Noto Sans TC',sans-serif",
          ...style,
        }
      }, [
        showGrain && h(PaperGrain, { key: 'grain', opacity: 0.45 }),
        children,
        showMarks && h(PCropMarks, { key: 'marks' }),
      ]);
    }

    /* ─── Thin rule ─── */
    function PRule({ width, color, height, style }) {
      return h('div', {
        style: {
          width: width || '24mm',
          height: height !== undefined ? height : 0.5,
          background: color || PRINT.goldFaint,
          ...style,
        }
      });
    }

    /* ─── Watermark ─── */
    function PWatermark({ ch, size, color, pos, italic }) {
      return h('div', {
        style: {
          position: 'absolute',
          ...(pos || { left: '50%', top: '50%' }),
          transform: `translate(-50%, -50%) ${italic ? 'skewX(-6deg)' : ''}`,
          fontFamily: "'Noto Serif TC',serif",
          fontWeight: 500,
          fontSize: size || 480,
          lineHeight: 0.78,
          color: color || 'rgba(196,162,74,0.05)',
          letterSpacing: '-0.06em',
          pointerEvents: 'none',
          userSelect: 'none',
          whiteSpace: 'nowrap',
          fontStyle: italic ? 'italic' : 'normal',
        }
      }, ch || '8');
    }

    /* ─── Pill label ─── */
    function PillLabel({ children, sparkle, size, gap, padding }) {
      const showSparkle = sparkle !== undefined ? sparkle : true;
      const s = size || 7;
      return h('div', {
        style: {
          display: 'inline-flex',
          alignItems: 'center',
          gap: gap || 4,
          padding: padding || '3pt 9pt',
          border: `0.6pt solid ${PRINT.goldDim}`,
          background: 'rgba(196,162,74,0.04)',
          borderRadius: 999,
        }
      }, [
        showSparkle && h('svg', {
          key: 'sparkle-svg',
          width: s + 1,
          height: s + 1,
          viewBox: '0 0 16 16',
          style: { flex: '0 0 auto' }
        }, [
          h('path', { key: 'sparkle-path', d: 'M8 0 L9 6 L15 8 L9 10 L8 16 L7 10 L1 8 L7 6 Z', fill: PRINT.gold }),
          h('circle', { key: 'c1', cx: '3', cy: '3', r: '0.8', fill: PRINT.gold, opacity: '0.6' }),
          h('circle', { key: 'c2', cx: '13', cy: '13', r: '0.8', fill: PRINT.gold, opacity: '0.6' }),
        ]),
        h(PMono, { key: 'text', size: s, color: PRINT.gold, track: '0.32em', weight: 700 }, children)
      ]);
    }

    /* ─── Title block ─── */
    function TitleBlock({ en, zh, size, align, italic }) {
      const s = size || 1;
      const fs = 36 * s;
      const alignVal = align === 'left' ? 'flex-start' : (align === 'right' ? 'flex-end' : 'center');
      return h('div', {
        style: {
          display: 'flex',
          flexDirection: 'column',
          alignItems: alignVal,
        }
      }, [
        h('div', {
          key: 'en-title',
          style: {
            fontFamily: "'Noto Serif TC',serif",
            fontSize: `${fs}pt`,
            fontWeight: 400,
            color: PRINT.brown,
            fontStyle: italic || italic === undefined ? 'italic' : 'normal',
            letterSpacing: '0.01em',
            lineHeight: 1.05,
          }
        }, en || 'Mark Journal'),
        zh && h('div', {
          key: 'zh-title',
          style: {
            marginTop: 4 * s,
            fontFamily: "'Noto Serif TC',serif",
            fontWeight: 300,
            fontSize: `${fs * 0.32}pt`,
            color: PRINT.brown,
            letterSpacing: '0.42em',
            paddingLeft: '0.4em',
          }
        }, zh)
      ]);
    }

    /* ─── Icon recolor (img + filter — mask-image unsupported by html2canvas) ─── */
    function PMaskIcon({ src, size, color, opacity, style }) {
      const s = size || 40;
      const filter = color === PRINT.gold || color === '#d4a843'
        ? 'brightness(0) sepia(1) saturate(4) hue-rotate(2deg) brightness(0.92)'
        : 'brightness(0) invert(1)';
      return h('img', {
        src,
        style: {
          display: 'inline-block',
          width: s,
          height: s,
          objectFit: 'contain',
          opacity: opacity !== undefined ? opacity : 1,
          filter,
          ...style,
        }
      });
    }

    /* ─── Infinity badge (double ring) ─── */
    function InfinityBadge({ size, fg, accent, stroke, inner }) {
      const W = 200, H = 100;
      const s = size || 80;
      const r = 42, cy = 50, cx1 = 55, cx2 = 145;
      const str = stroke || 1.4;
      const fColor = fg || PRINT.gold;
      const aColor = accent || PRINT.gold;
      const hasInner = inner !== undefined ? inner : true;
      return h('svg', {
        width: s,
        height: s * (H / W),
        viewBox: `0 0 ${W} ${H}`,
        overflow: 'visible'
      }, [
        h('circle', { key: 'bg1', cx: cx1, cy: cy, r: r + 5, fill: 'none', stroke: fColor, strokeWidth: str * 0.4, opacity: 0.32 }),
        h('circle', { key: 'bg2', cx: cx2, cy: cy, r: r + 5, fill: 'none', stroke: fColor, strokeWidth: str * 0.4, opacity: 0.32 }),
        h('circle', { key: 'ring1', cx: cx1, cy: cy, r: r, fill: 'none', stroke: fColor, strokeWidth: str, strokeLinecap: 'round' }),
        h('circle', { key: 'ring2', cx: cx2, cy: cy, r: r, fill: 'none', stroke: fColor, strokeWidth: str, strokeLinecap: 'round' }),
        h('g', { key: 'center', transform: 'translate(100 50)' }, [
          h('circle', { key: 'dot', r: 2.6, fill: aColor }),
          hasInner && h('circle', { key: 'inner-ring', r: 7, fill: 'none', stroke: aColor, strokeWidth: 0.6, opacity: 0.5 })
        ])
      ]);
    }

    /* ─── Co-brand lockup ─── */
    function PCoBrand({ height, gap }) {
      const hVal = height || 11;

/* ═══════════════════════════════════════════════
   Real QR code component (scannable)
═══════════════════════════════════════════════ */
function RealQR({ url, sizeMm }) {
  const canvasRef = useRef(null);
  const sizePx = Math.round((sizeMm || 80) * 3.7795);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !url || typeof qrcode === 'undefined') return;
    try {
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      const count = qr.getModuleCount();
      const cell = sizePx / count;
      canvas.width = sizePx;
      canvas.height = sizePx;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, sizePx, sizePx);
      for (let r = 0; r < count; r++) {
        for (let c = 0; c < count; c++) {
          ctx.fillStyle = qr.isDark(r, c) ? '#f4e8cc' : 'transparent';
          ctx.fillRect(Math.floor(c * cell), Math.floor(r * cell), Math.ceil(cell), Math.ceil(cell));
        }
      }
    } catch (e) {
      console.warn('QR generation failed:', e);
    }
  }, [url, sizePx]);

  return (
    <div style={{
      position: 'relative',
      width: `${sizeMm}mm`,
      height: `${sizeMm}mm`,
      background: `radial-gradient(circle at 30% 25%, rgba(212,168,67,0.12) 0%, rgba(0,0,0,0.4) 100%)`,

      <PTick pos={{ top: '-2mm', right: '-2mm' }} flipX len={10} weight={1.2} color={PRINT.gold} opacity={0.9} />
      <PTick pos={{ bottom: '-2mm', left: '-2mm' }} flipY len={10} weight={1.2} color={PRINT.gold} opacity={0.9} />
      <PTick pos={{ bottom: '-2mm', right: '-2mm' }} flipX flipY len={10} weight={1.2} color={PRINT.gold} opacity={0.9} />
      <canvas ref={canvasRef} style={{ display: 'block', width: '100%', height: '100%' }} />
    </div>
  );
}

/* ═══════════════════════════════════════════════
   01–11 · Standee (集印點立牌)
═══════════════════════════════════════════════ */
function StandeeContent({ item, isEgg }) {
  if (!item) {
    return <div style={{ color: PRINT.cream, padding: 20, background: PRINT.bg, width: '210mm', height: '297mm' }}>找不到點位</div>;
  }

  const num = isEgg ? item.eggId : item.n;
  const numDisplay = isEgg ? `Egg ${item.eggId}` : `No. ${num}`;

  /* ── Shared frame decorations ── */
  const PageFrame = () => <>
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none',
      background: `radial-gradient(ellipse 140% 60% at 50% 20%, rgba(212,168,67,0.14) 0%, transparent 65%)` }} />
    <div style={{ position: 'absolute', inset: '5.5mm', border: `1pt solid ${PRINT.goldDim}`, pointerEvents: 'none' }} />
    <div style={{ position: 'absolute', inset: '8mm', border: `0.3pt solid ${PRINT.goldHair}`, pointerEvents: 'none' }} />
    <PTick pos={{ top: '5.5mm', left: '5.5mm' }} len={16} weight={1.5} />
    <PTick pos={{ top: '5.5mm', right: '5.5mm' }} flipX len={16} weight={1.5} />
    <PTick pos={{ bottom: '5.5mm', left: '5.5mm' }} flipY len={16} weight={1.5} />
    <PTick pos={{ bottom: '5.5mm', right: '5.5mm' }} flipX flipY len={16} weight={1.5} />
  </>;

  /* ── Hidden egg standee: A6 (105×148mm) — animal-colour edition ── */
  if (isEgg) {
    const c = item.colors;
    const [gradA, gradB, gradC] = c.gradient;
    return (
      <PPage wMm={105} hMm={148} style={{ background: c.bg }}>
        {/* Colour wash */}
        <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none',
          background: `radial-gradient(ellipse 160% 70% at 50% 18%, ${c.border} 0%, transparent 68%)` }} />

        {/* Animal SVG — large background illustration */}
        <div style={{ position: 'absolute', bottom: '14mm', right: '-6mm', width: '68mm', height: '68mm',
          opacity: 0.18, pointerEvents: 'none', overflow: 'hidden' }}>
          <img src={item.svgSrc} alt="" style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block' }} />
        </div>

        {/* Frame */}
        <div style={{ position: 'absolute', inset: '3mm', border: `0.8pt solid ${c.border}`, pointerEvents: 'none' }} />
        <div style={{ position: 'absolute', inset: '4.5mm', border: `0.3pt solid ${c.hairline}`, pointerEvents: 'none' }} />
        <PTick pos={{ top: '3mm', left: '3mm' }} len={8} color={c.accent} opacity={0.8} weight={0.9} />
        <PTick pos={{ top: '3mm', right: '3mm' }} flipX len={8} color={c.accent} opacity={0.8} weight={0.9} />
        <PTick pos={{ bottom: '3mm', left: '3mm' }} flipY len={8} color={c.accent} opacity={0.8} weight={0.9} />
        <PTick pos={{ bottom: '3mm', right: '3mm' }} flipX flipY len={8} color={c.accent} opacity={0.8} weight={0.9} />

        {/* Co-brand + pill */}
        <div style={{ position: 'absolute', top: '6mm', left: '7mm', right: '7mm',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2mm' }}>
          <PCoBrand height={7} gap={7} />
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '1.5pt 8pt',
            border: `0.6pt solid ${c.border}`, background: `${c.border.replace('0.45','0.12')}`, borderRadius: 999 }}>
            <PMono size={5.5} color={c.accent} track="0.3em" weight={700}>✦  HIDDEN EGG  ·  隱藏點</PMono>
          </div>
        </div>

        {/* Hero: animal SVG (featured) */}
        <div style={{ position: 'absolute', top: '22mm', left: '50%', transform: 'translateX(-50%)', width: '44mm', height: '44mm' }}>
          <img src={item.svgSrc} alt={item.element} style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block',
            filter: `drop-shadow(0 0 6px ${c.glow})` }} />
        </div>

        {/* Element name + rule */}
        <div style={{ position: 'absolute', top: '69mm', left: '4mm', right: '4mm', textAlign: 'center' }}>
          <div style={{ margin: '0 auto 2mm', width: '28mm', height: '0.8pt',
            background: `linear-gradient(90deg, transparent, ${gradA} 20%, ${gradB} 50%, ${gradC} 80%, transparent)` }} />
          <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '22pt', fontWeight: 600,
            letterSpacing: '0.22em', lineHeight: 1.1,
            background: `linear-gradient(135deg, ${gradA} 0%, ${gradB} 50%, ${gradC} 100%)`,
            WebkitBackgroundClip: 'text', backgroundClip: 'text', WebkitTextFillColor: 'transparent', color: 'transparent' }}>
            {item.element}
          </div>
          <div style={{ marginTop: '1.5mm', fontFamily: "'Noto Serif TC',serif", fontSize: '8.5pt',
            fontWeight: 400, color: PRINT.creamDim, letterSpacing: '0.38em', paddingLeft: '0.38em' }}>
            {item.area}
          </div>
        </div>

        {/* QR code */}
        <div style={{ position: 'absolute', top: '86mm', left: '50%', transform: 'translateX(-50%)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2.5mm' }}>
          <RealQR url={item.url} sizeMm={38} />
          <div style={{ textAlign: 'center' }}>
            <PMono size={6} color={c.mid} track="0.4em" weight={700}>SCAN TO STAMP</PMono>
            <div style={{ marginTop: '1mm' }}>
              <PMono size={5.5} color={PRINT.creamMute} track="0.2em" weight={400}>掃碼蓋章 · 集滿 8 枚參加抽獎</PMono>
            </div>
          </div>
        </div>

        {/* Station ID */}
        <div style={{ position: 'absolute', top: '127mm', left: 0, right: 0, textAlign: 'center' }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: '3mm' }}>
            <div style={{ width: '7mm', height: '0.6pt', background: c.border }} />
            <PMono size={6} color={c.accent} track="0.46em" weight={700}>{numDisplay}</PMono>
            <div style={{ width: '7mm', height: '0.6pt', background: c.border }} />
          </div>
        </div>

        {/* Copy */}
        <div style={{ position: 'absolute', top: '133mm', left: '7mm', right: '7mm', textAlign: 'center' }}>
          <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '7.5pt', fontStyle: 'italic',
            lineHeight: 1.8, letterSpacing: '0.06em', color: PRINT.creamDim, fontWeight: 400 }}>
            {item.copy}
          </p>
        </div>

        {/* Footer */}
        <div style={{ position: 'absolute', bottom: '4.5mm', left: 0, right: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1.5mm' }}>
          <NexusWordmark width={55} sub={false} align="center" />
          <PMono size={4.5} color={PRINT.creamFaint} track="0.24em" weight={400}>
            見つけた人へ。 ／ For Those Who Found It.
          </PMono>
        </div>
      </PPage>
    );
  }

  /* ── Main standee (8 stations): area as hero + prize preview bottom third ── */
  return (
    <PPage wMm={210} hMm={297}>
      <PageFrame />

      {/* 13–28mm: Co-brand + pill (compact) */}
      <div style={{ position: 'absolute', top: '13mm', left: '14mm', right: '14mm',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2.5mm' }}>
        <PCoBrand height={11} gap={10} />
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '2pt 10pt',
          border: `0.6pt solid ${PRINT.goldDim}`, background: 'rgba(212,168,67,0.09)', borderRadius: 999 }}>
          <PMono size={7.5} color={PRINT.gold} track="0.3em" weight={700}>✦  PHYSICAL JOURNEY  ·  集印探索</PMono>
        </div>
      </div>

      {/* 28–70mm: AREA hero (large, light) + copy */}
      <div style={{ position: 'absolute', top: '28mm', left: '8mm', right: '8mm', textAlign: 'center' }}>
        <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '60pt', fontWeight: 600,
          color: PRINT.cream, letterSpacing: '0.2em', lineHeight: 1.0,
          textShadow: `0 0 48px rgba(212,168,67,0.4), 0 2px 12px rgba(0,0,0,0.85)` }}>
          {item.area}
        </div>
        <p style={{ margin: '5mm 0 0', fontFamily: "'Noto Serif TC',serif", fontSize: '11pt', fontStyle: 'italic',
          lineHeight: 1.65, letterSpacing: '0.07em', color: PRINT.creamDim, fontWeight: 400 }}>
          {item.copy}
        </p>
      </div>

      {/* 74–84mm: Station No. strip + element name */}
      <div style={{ position: 'absolute', top: '74mm', left: 0, right: 0, textAlign: 'center' }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: '6mm' }}>
          <div style={{ width: '18mm', height: '0.6pt',
            background: `linear-gradient(90deg, transparent 0%, ${PRINT.goldDim} 100%)` }} />
          <PMono size={11} color={PRINT.gold} track="0.52em" weight={700}>{numDisplay}</PMono>
          <div style={{ width: '18mm', height: '0.6pt',
            background: `linear-gradient(90deg, ${PRINT.goldDim} 0%, transparent 100%)` }} />
        </div>
        <div style={{ marginTop: '2.5mm', fontFamily: "'Noto Serif TC',serif", fontSize: '12pt', fontWeight: 400,
          color: PRINT.creamMute, letterSpacing: '0.26em', paddingLeft: '0.26em' }}>
          {item.element}
        </div>
      </div>

      {/* 90–175mm: QR code */}
      <div style={{ position: 'absolute', top: '90mm', left: '50%', transform: 'translateX(-50%)' }}>
        <RealQR url={item.url} sizeMm={74} />
      </div>

      {/* 168–193mm: SCAN label + location */}
      <div style={{ position: 'absolute', top: '168mm', left: 0, right: 0, textAlign: 'center',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2mm' }}>
        <PMono size={12} color={PRINT.gold} track="0.44em" weight={700}>SCAN TO STAMP</PMono>
        <PMono size={8.5} color={PRINT.creamMute} track="0.22em" weight={400}>掃碼蓋章 · 集滿 8 枚參加抽獎</PMono>
        <PMono size={8} color={PRINT.gold} track="0.28em" weight={600}>{item.loc}</PMono>
      </div>

      {/* 193–297mm: Prize section — left steak image / right text */}
      <div style={{ position: 'absolute', top: '193mm', left: 0, right: 0, bottom: 0,
        display: 'flex', borderTop: '0.8pt solid rgba(212,168,67,0.6)' }}>

        {/* Left 1/3: full-height steak photo */}
        <div style={{ width: '33.33%', overflow: 'hidden', flexShrink: 0 }}>
          <img src={item.img || 'assets/image_steak_03.png'} alt="" style={{
            width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center 35%', display: 'block'
          }} />
        </div>

        {/* Right 2/3: warm dark bg (#1c100a), different from top section (#0e0a06) */}
        <div style={{ flex: 1, background: '#1c100a', borderLeft: '0.5pt solid rgba(212,168,67,0.35)',
          display: 'flex', flexDirection: 'column', justifyContent: 'center',
          padding: '5mm 9mm 4mm 8mm', gap: '2.5mm' }}>

          {/* INFINITY DAY label + date */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <PMono size={7.5} color={PRINT.gold} track="0.26em" weight={700}>INFINITY DAY · 無限日抽獎</PMono>
            <PMono size={6.5} color={PRINT.goldDim} track="0.15em" weight={600}>5/24—5/31</PMono>
          </div>

          {/* Hairline */}
          <div style={{ height: '0.5pt', background: 'rgba(212,168,67,0.32)' }} />

          {/* Station-specific promo copy */}
          <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '10pt', fontStyle: 'italic',
            lineHeight: 1.6, letterSpacing: '0.04em', color: PRINT.cream, fontWeight: 400 }}>
            {item.promo}
          </p>

          {/* Prize name */}
          <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '14pt', fontWeight: 600,
            letterSpacing: '0.06em', color: PRINT.gold, lineHeight: 1.2 }}>
            日本和牛牛排雙人套餐
            <div style={{ fontFamily: "'Noto Sans TC',sans-serif", fontSize: '7.5pt', fontWeight: 400,
              color: PRINT.goldDim, letterSpacing: '0.05em', marginTop: '1mm' }}>
              佐特製橙醋醬汁 · NT$2,300 起
            </div>
          </div>

          {/* Hairline */}
          <div style={{ height: '0.5pt', background: 'rgba(212,168,67,0.22)' }} />

          {/* Also redeemable: bigger thumbnails (18mm) */}
          <div>
            <PMono size={5.5} color={PRINT.goldDim} track="0.28em" weight={600}>還有超多美味餐點等著你來天天抽</PMono>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '2.5mm' }}>
              {MENU_ITEMS.map(d => (
                <div key={d.src} style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>

/* ═══════════════════════════════════════════════
   Download helpers
═══════════════════════════════════════════════ */
const PX_PER_MM = 3.7795;
const safeName = (label) => label.replace(/[\/\\:*?"<>|·‧]/g, '_').replace(/\s+/g, '_');

function triggerBlobDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

async function panelToPdfBlob(panels) {
  const { jsPDF } = window.jspdf;
  let pdf = null;
  for (const el of panels) {
    const canvas = await html2canvas(el, {
      scale: 3, useCORS: true, allowTaint: true, logging: false,
      backgroundColor: null, width: el.offsetWidth, height: el.offsetHeight,
    });
    const wMm = Math.round(el.offsetWidth / PX_PER_MM);
    const hMm = Math.round(el.offsetHeight / PX_PER_MM);
    const ori = wMm > hMm ? 'l' : 'p';
    if (!pdf) pdf = new jsPDF({ orientation: ori, unit: 'mm', format: [wMm, hMm] });
    else pdf.addPage([wMm, hMm], ori);
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, wMm, hMm);
  }
  return pdf ? pdf.output('blob') : null;
}

async function elementToPngBlob(el) {
  const canvas = await html2canvas(el, {
    scale: 2, useCORS: true, allowTaint: true, logging: false, backgroundColor: null,
  });
  return new Promise(r => canvas.toBlob(r, 'image/png'));
}

/* ═══════════════════════════════════════════════
   DCSection
═══════════════════════════════════════════════ */
function DCSection({ title, subtitle, count, type = 'print', children }) {

    <div className="dc-section">

/* ═══════════════════════════════════════════════
   DCArtboard (per-item download)
═══════════════════════════════════════════════ */
function DCArtboard({ label, dims, type = 'print', captureId, children }) {
  const frameRef = useRef(null);
  const [focused, setFocused] = useState(false);
  const [downloading, setDownloading] = useState(false);

  useEffect(() => {
    if (!focused) return;
    const handler = (e) => { if (e.key === 'Escape') setFocused(false); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [focused]);

  const downloadItem = useCallback(async () => {
    setDownloading(true);
    try {
      await document.fonts.ready;
      const name = safeName(label);
      if (type === 'digital') {
        const target = captureId ? document.getElementById(captureId) : null;
        const el = target ? target.firstElementChild : null;
        if (!el) { console.warn('No capture target for', label); return; }
        const blob = await elementToPngBlob(el);
        if (blob) triggerBlobDownload(blob, `${name}.png`);
      } else {
        const panels = Array.from(frameRef.current.querySelectorAll('.dc-print-content'));
        if (!panels.length) { console.warn('No print panels for', label); return; }
        const blob = await panelToPdfBlob(panels);
        if (blob) triggerBlobDownload(blob, `${name}.pdf`);
      }
    } catch (e) {
      console.error('Download failed for', label, e);
    } finally {
      setDownloading(false);
    }
  }, [label, type, captureId]);

  const downloadVector = useCallback(() => {
    const panels = Array.from(frameRef.current.querySelectorAll('.dc-print-content'));
    if (!panels.length) return;
    const firstPage = panels[0].firstElementChild;
    const wMm = firstPage?.style?.width || '210mm';
    const hMm = firstPage?.style?.height || '297mm';

    // Clone each panel; replace <canvas> (QR codes) with <img data-url>
    const clonedPanels = panels.map(panel => {
      const clone = panel.cloneNode(true);
      const origCanvases = Array.from(panel.querySelectorAll('canvas'));
      const cloneCanvases = Array.from(clone.querySelectorAll('canvas'));
      origCanvases.forEach((cv, i) => {
        const img = document.createElement('img');
        img.src = cv.toDataURL();
        img.style.cssText = cv.style.cssText;
        img.style.display = 'block';
        cloneCanvases[i]?.replaceWith(img);
      });
      return clone;
    });

    // Absolutize relative src paths so blob window can load images
    const base = document.baseURI.replace(/\/[^/]*$/, '/');
    const panelsHtml = clonedPanels.map((clone, i) => {
      const isLast = i === clonedPanels.length - 1;
      let html = clone.outerHTML;
      html = html.replace(/\bsrc="(?!https?:\/\/|data:)([^"]+)"/g,
        (_, p) => `src="${base}${p}"`);
      return `<div style="margin:0;padding:0;page-break-after:${isLast ? 'avoid' : 'always'}">${html}</div>`;
    }).join('\n');

    const pageHtml = `<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @page { margin: 0; size: ${wMm} ${hMm}; }
  html, body { margin: 0; padding: 0; background: transparent; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
</style></head><body>
${panelsHtml}
<script>document.fonts.ready.then(() => setTimeout(() => window.print(), 900));<\/script>
</body></html>`;

    const blob = new Blob([pageHtml], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 30000);
  }, [label]);

  return (
    <>
      <div className="dc-artboard" data-type={type} data-capture-id={captureId || ''}>
        <div className="dc-artboard-header">
          <div className="dc-artboard-label">{label}</div>
          {dims && <div className="dc-artboard-dims">{dims}</div>}
        </div>
        <div className="dc-artboard-frame dc-zoom" ref={frameRef} onClick={() => setFocused(true)}>
          {children}
        </div>
        <div className="dc-artboard-footer">
          {type !== 'digital' && (
            <button
              className="dc-dl-item-btn"
              style={{ marginRight: 6, opacity: 0.7, fontSize: 10 }}
              onClick={(e) => { e.stopPropagation(); downloadVector(); }}
            >
              ↓ 向量 PDF
            </button>
          )}
          <button
            className="dc-dl-item-btn"
            disabled={downloading}
            onClick={(e) => { e.stopPropagation(); downloadItem(); }}
          >
            {downloading
              ? <><span className="dc-dl-spinner" style={{ width: 10, height: 10, borderWidth: 1.5 }} />處理中…</>
              : `↓ ${type === 'digital' ? 'PNG' : 'PDF'}`}
          </button>
        </div>
      </div>

      {focused && (
        <div className="dc-focus-overlay" onClick={() => setFocused(false)}>
          <div className="dc-focus-inner" onClick={(e) => e.stopPropagation()}>
            <button className="dc-focus-close" onClick={() => setFocused(false)}>ESC · 關閉</button>
            <div className="dc-focus-label">{label}{dims ? ` · ${dims}` : ''}</div>
            <div style={{ overflow: 'auto', maxWidth: '95vw', maxHeight: '90vh', display: 'flex', gap: 20 }}>
              {children}
            </div>
          </div>
        </div>
      )}
    </>
  );
}
