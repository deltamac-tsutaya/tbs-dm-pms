<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>21 · A 面 · TSUTAYA BOOKSTORE - 桌面卡 D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/print-common.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="common/print-common.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { PRINT, PPage, PWatermark, PTick, PCoBrand, PillLabel, GoldText, InfinityBadge, PMono } = window.PrintCommon;

    function TableCardDFront() {
      return (
        <PPage wMm={105} hMm={148}>
          <PWatermark ch="8" size={320} color="rgba(196,162,74,0.035)" pos={{ left: '50%', top: '50%' }} />

          <PTick pos={{ top: '6mm', left: '6mm' }} len={6} weight={0.6} />
          <PTick pos={{ top: '6mm', right: '6mm' }} flipX len={6} weight={0.6} />
          <PTick pos={{ bottom: '6mm', left: '6mm' }} flipY len={6} weight={0.6} />
          <PTick pos={{ bottom: '6mm', right: '6mm' }} flipX flipY len={6} weight={0.6} />

          {/* Co-brand */}
          <div style={{ position: 'absolute', top: '10mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PCoBrand height={7.5} gap={7} />
          </div>

          {/* Title Pill */}
          <div style={{ position: 'absolute', top: '22mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PillLabel size={6}>TSUTAYA BOOKSTORE ‧ 台中市政店</PillLabel>
          </div>

          {/* Infinity Mark */}
          <div style={{ position: 'absolute', top: '38mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <InfinityBadge size={28} fg={PRINT.gold} accent={PRINT.gold} stroke={1.0} />
          </div>

          {/* Copy Title */}
          <div style={{ position: 'absolute', top: '56mm', left: '10mm', right: '10mm', textAlign: 'center' }}>
            <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '12pt', lineHeight: 1.55, letterSpacing: '0.08em', color: PRINT.brown, fontWeight: 400 }}>
              八週年特別企劃，<br/>
              期待與你在此相遇。
            </p>
          </div>

          {/* Micro instructions */}
          <div style={{ position: 'absolute', top: '88mm', left: '10mm', right: '10mm', textAlign: 'center' }}>
            <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '7.5pt', lineHeight: 1.8, color: PRINT.brown, letterSpacing: '0.04em', fontWeight: 300 }}>
              自 2018 年起，我們在此陪伴你的日常。<br/>
              在這值得紀念的時刻，<br/>
              邀請你一同探索生活的無限可能。
            </p>
          </div>

          {/* Action strip */}
          <div style={{ position: 'absolute', bottom: '16mm', left: 0, right: 0, textAlign: 'center' }}>
            <PMono size={6.5} color={PRINT.gold} track="0.36em" weight={700}>JOIN US NOW ‧ 立即加入</PMono>
          </div>

          {/* Bottom margin info */}
          <div style={{ position: 'absolute', bottom: '8mm', left: '10mm', right: '10mm', display: 'flex', justifyContent: 'space-between', borderTop: `0.4pt solid ${PRINT.goldFaint}`, paddingTop: 3 }}>
            <PMono size={5.5} color={PRINT.creamFaint} track="0.2em">NEXUS.LIFE</PMono>
            <PMono size={5.5} color={PRINT.creamFaint} track="0.2em">TABLE CARD 04</PMono>
          </div>
        </PPage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TableCardDFront />);
  </script>
</body>
</html>
