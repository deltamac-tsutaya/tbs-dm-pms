<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>24 · P2 · 電子看板海報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/print-common.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="common/print-common.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { PRINT, PPage, PWatermark, PTick, PCoBrand, PillLabel, GoldText, InfinityBadge, PMono, PRule } = window.PrintCommon;

    function DigitalPosterPage() {
      return (
        <PPage wMm={216} hMm={384}>
          <PWatermark ch="∞" size={1300} color="rgba(196,162,74,0.022)" pos={{ left: '50%', top: '50%' }} />

          <PTick pos={{ top: '8mm', left: '8mm' }} len={12} weight={0.8} />
          <PTick pos={{ top: '8mm', right: '8mm' }} flipX len={12} weight={0.8} />
          <PTick pos={{ bottom: '8mm', left: '8mm' }} flipY len={12} weight={0.8} />
          <PTick pos={{ bottom: '8mm', right: '8mm' }} flipX flipY len={12} weight={0.8} />

          {/* Co-brand */}
          <div style={{ position: 'absolute', top: '22mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PCoBrand height={13} gap={12} />
          </div>

          {/* Pill */}
          <div style={{ position: 'absolute', top: '44mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PillLabel size={8.5}>8TH ANNIVERSARY ‧ DIGITAL SCREEN</PillLabel>
          </div>

          {/* Title */}
          <div style={{ position: 'absolute', top: '62mm', left: 0, right: 0, textAlign: 'center' }}>
            <h1 style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '56pt', fontWeight: 300, color: PRINT.brown, letterSpacing: '0.12em', lineHeight: 1.25 }}>
              無限日常　<span style={{ fontStyle: 'italic', fontFamily: "'Noto Serif TC',serif", color: PRINT.gold }}>∞</span><br/>連結生活
            </h1>
            <div style={{ marginTop: 10 }}>
              <PMono size={9.5} color={PRINT.goldDim} track="0.45em">NEXUS LIFE ‧ TSUTAYA BOOKSTORE</PMono>
            </div>
          </div>

          {/* Center decorative block */}
          <div style={{ position: 'absolute', top: '150mm', left: '50%', transform: 'translateX(-50%)', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            <InfinityBadge size={160} fg={PRINT.gold} accent={PRINT.gold} stroke={0.8} />
          </div>

          {/* Slogan */}
          <div style={{ position: 'absolute', top: '224mm', left: 0, right: 0, textAlign: 'center' }}>
            <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '20pt', lineHeight: 1.6, letterSpacing: '0.16em', color: PRINT.brown, fontWeight: 300 }}>
              用 <GoldText style={{ fontWeight: 500 }}>8 天</GoldText> 的時間，<br/>
              把一個紀念日過得完整。
            </p>
          </div>

          {/* Join block */}
          <div style={{ position: 'absolute', top: '272mm', left: '28mm', right: '28mm' }}>
            <div style={{ borderTop: `0.5pt solid ${PRINT.goldDim}`, paddingTop: 12, textAlign: 'center' }}>
              <PMono size={7.5} color={PRINT.gold} track="0.36em" weight={700}>5/24 — 5/31 GRAND PRIZE WEEK ‧ 大獎週</PMono>
              <p style={{ margin: '6pt 0 0', fontFamily: "'Noto Serif TC',serif", fontSize: '11pt', color: PRINT.brown, letterSpacing: '0.08em' }}>
                每日 20:00 抽和牛雙人套餐
              </p>
            </div>
          </div>

          {/* Footer */}
          <div style={{ position: 'absolute', bottom: '22mm', left: '28mm', right: '28mm', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', borderTop: `0.5pt solid ${PRINT.goldDim}`, paddingTop: 12 }}>
            <div>
              <PMono size={6.5} color={PRINT.creamFaint} track="0.3em" weight={600}>EVENT PERIOD</PMono>
              <div style={{ marginTop: 2 }}>
                <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '13pt', color: PRINT.brown, fontWeight: 500, letterSpacing: '0.08em' }}>2026.04.25 — 05.31</span>
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <PMono size={6.5} color={PRINT.creamFaint} track="0.3em" weight={600}>LOCATION</PMono>
              <div style={{ marginTop: 2 }}>
                <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '13pt', color: PRINT.brown, fontWeight: 500, letterSpacing: '0.08em' }}>台中市政店 4F</span>
              </div>
            </div>
          </div>
        </PPage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<DigitalPosterPage />);
  </script>
</body>
</html>
