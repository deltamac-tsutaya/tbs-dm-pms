<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>集印點立牌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/print-common.css">
  <!-- Real QR code library -->
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="common/print-common.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { PRINT, PPage, PWatermark, PTick, PCoBrand, PMono, PRule } = window.PrintCommon;

    /* ── Real stamp URLs ── */
    const STAMP_POINTS = [
      { n: '01', area: '靈感補給站',   element: '無限', loc: '入口主題陳列區（2F）',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=cef53d02-f621-4a0f-8ac5-6d086fd8548a',
        copy: '從這裡走出去，8 與 ∞ 同時開始。' },
      { n: '02', area: '日常儀式感',   element: '陶杯', loc: '職人雜貨區（2F）',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=307fa785-0b6d-4804-b102-91c99feff219',
        copy: '手溫傳過陶杯，8 年的 ∞ 就在掌心。' },
      { n: '03', area: '都市放空點',   element: '風',   loc: '戶外座位區（3F）',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=28235074-fc63-42ef-b2e8-1c148651a98a',
        copy: '露台吹來 ∞ 的風，繞了 8 個年頭才停。' },
      { n: '04', area: '白日夢實驗室', element: '橡實', loc: '兒童繪本書櫃（3F）',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=ebf9986d-3393-4b78-a444-0c537b6f9866',
        copy: '一顆橡實用 8 年 ∞ 生長，長成整片森林。' },
      { n: '05', area: '打卡神級背景', element: '書',   loc: '樓梯書牆（3F）',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=e015052e-c04a-48af-9d15-662b18d6d166',
        copy: '8 層書牆向 ∞ 展開，每格都是新世界。' },
      { n: '06', area: '放鬆充電站',   element: '咖啡', loc: '吧檯區（2F）',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=55f33124-d27d-4414-80e7-a468a62f1977',
        copy: '一杯咖啡，8 年的 ∞ 日常，從未厭倦。' },
      { n: '07', area: '絕美光影濾鏡', element: '光點', loc: '天井吊燈區（3F）',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=aa22f6c4-3d79-48e3-ab10-820c513aa2ff',
        copy: '光從天井 ∞ 落，你離第 8 枚只剩一步。' },
      { n: '08', area: '情報交流道',   element: '花朵', loc: '告示牌（1F）',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=27b1d93f-ab44-4722-8e72-dc1b2fa2dee8',
        copy: '8 年 ∞ 循環，每天都有一朵花記住你。' },
    ];

    const HIDDEN_EGGS = [
      { id: 'a', eggId: 'A', area: '夥伴',       element: '松鼠',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=0ed1fc2f-c16d-4a81-a2da-ea9032c24f66',
        copy: '牠等了你 8 分鐘，或者是 ∞ 分鐘，松鼠自己也數不清。' },
      { id: 'b', eggId: 'B', area: '野生小夥伴', element: '蜂鳥',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=b7b52f93-67f0-429a-babd-ac8ef3f1d253',
        copy: '這個位子空著。蜂鳥只停在不趕路的人身邊。' },
      { id: 'c', eggId: 'C', area: '野生大夥伴', element: '麋鹿',
        url: 'https://taichung-8th-anniversary.vercel.app/?id=a10a94ad-a6f4-45db-8674-963513f8aa40',
        copy: '電梯只有上下，沒有 ∞。麋鹿選擇住在這裡，等一個看得懂的人。' },
    ];

    /* ── Real QR code component ── */
    function RealQR({ url, sizeMm }) {
      const canvasRef = React.useRef(null);
      const sizePx = Math.round((sizeMm || 80) * 3.7795);

      React.useEffect(() => {
        if (!canvasRef.current || !url) return;
        QRCode.toCanvas(canvasRef.current, url, {
          width: sizePx,
          margin: 2,
          color: {
            dark:  '#f4e8cc',   // cream modules on dark bg
            light: 'transparent',
          },
          errorCorrectionLevel: 'M',
        }, (err) => {
          if (err) console.error('QR error:', err);
        });
      }, [url, sizePx]);

      return (
        <div style={{
          position: 'relative',
          width: `${sizeMm}mm`,
          height: `${sizeMm}mm`,
          background: `radial-gradient(circle at 30% 25%, rgba(212,168,67,0.12) 0%, rgba(0,0,0,0.4) 100%)`,
          border: `1.2pt solid ${PRINT.goldDim}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '4mm',
          boxSizing: 'border-box',
          boxShadow: `inset 0 1pt 2pt rgba(255,255,255,0.06), 0 4mm 16mm rgba(0,0,0,0.5)`,
        }}>
          {/* Gold corner ticks */}
          <PTick pos={{ top: '-2mm', left: '-2mm' }} len={10} weight={1.2} color={PRINT.gold} opacity={0.9} />
          <PTick pos={{ top: '-2mm', right: '-2mm' }} flipX len={10} weight={1.2} color={PRINT.gold} opacity={0.9} />
          <PTick pos={{ bottom: '-2mm', left: '-2mm' }} flipY len={10} weight={1.2} color={PRINT.gold} opacity={0.9} />
          <PTick pos={{ bottom: '-2mm', right: '-2mm' }} flipX flipY len={10} weight={1.2} color={PRINT.gold} opacity={0.9} />
          <canvas ref={canvasRef} style={{ display: 'block', width: '100%', height: '100%' }} />
        </div>
      );
    }

    function StandeePage() {
      const params = new URLSearchParams(window.location.search);
      const targetId = (params.get('id') || '01').toLowerCase();

      let item = STAMP_POINTS.find(s => s.n === targetId);
      let isEgg = false;

      if (!item) {
        item = HIDDEN_EGGS.find(e => e.id === targetId || e.eggId.toLowerCase() === targetId);
        isEgg = true;
      }

      if (!item) {
        return <div style={{ color: PRINT.cream, padding: 20, background: PRINT.bg, minHeight: '100vh' }}>
          找不到點位 ID: {targetId}
        </div>;
      }

      const num = isEgg ? item.eggId : item.n;
      const numDisplay = isEgg ? `Egg ${item.eggId}` : `No. ${num}`;

      return (
        <PPage wMm={210} hMm={297}>

          {/* ── Radial ambient glow ── */}
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none',
            background: `radial-gradient(ellipse 140% 90% at 50% 30%, rgba(212,168,67,0.16) 0%, transparent 65%)`,
          }} />

          {/* ── Outer frame ── */}
          <div style={{
            position: 'absolute', inset: '5.5mm',
            border: `1pt solid ${PRINT.goldDim}`,
            pointerEvents: 'none',
          }} />
          <div style={{
            position: 'absolute', inset: '8mm',
            border: `0.3pt solid ${PRINT.goldHair}`,
            pointerEvents: 'none',
          }} />

          {/* ── Corner ticks (outer) ── */}
          <PTick pos={{ top: '5.5mm', left: '5.5mm' }} len={16} weight={1.5} />
          <PTick pos={{ top: '5.5mm', right: '5.5mm' }} flipX len={16} weight={1.5} />
          <PTick pos={{ bottom: '5.5mm', left: '5.5mm' }} flipY len={16} weight={1.5} />
          <PTick pos={{ bottom: '5.5mm', right: '5.5mm' }} flipX flipY len={16} weight={1.5} />

          {/* ── TOP: co-brand + type badge ── */}
          <div style={{
            position: 'absolute', top: '13mm', left: '14mm', right: '14mm',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '3.5mm',
          }}>
            <PCoBrand height={13} gap={12} />
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 6,
              padding: '2.5pt 12pt',
              border: `0.7pt solid ${PRINT.goldDim}`,
              background: 'rgba(212,168,67,0.1)',
              borderRadius: 999,
            }}>
              <PMono size={8.5} color={PRINT.gold} track="0.32em" weight={700}>
                {isEgg ? '✦  HIDDEN EGG  ·  隱藏點' : '✦  PHYSICAL JOURNEY  ·  集印探索'}
              </PMono>
            </div>
          </div>

          {/* ── HERO: Element name (giant) ── */}
          <div style={{
            position: 'absolute', top: '42mm', left: '8mm', right: '8mm',
            textAlign: 'center',
          }}>
            <div style={{
              fontFamily: "'Noto Serif TC',serif",
              fontSize: '96pt', fontWeight: 600,
              color: PRINT.cream,
              letterSpacing: '0.18em',
              lineHeight: 1.0,
              textShadow: `0 0 48px rgba(212,168,67,0.45), 0 2px 12px rgba(0,0,0,0.8)`,
            }}>
              {item.element}
            </div>

            {/* Gold accent line */}
            <div style={{
              margin: '4mm auto 0',
              width: '44mm', height: '1.5pt',
              background: `linear-gradient(90deg, transparent 0%, ${PRINT.gold} 25%, ${PRINT.goldLt} 50%, ${PRINT.gold} 75%, transparent 100%)`,
            }} />

            {/* Area name */}
            <div style={{
              marginTop: '4.5mm',
              fontFamily: "'Noto Serif TC',serif",
              fontSize: '20pt', fontWeight: 300,
              color: PRINT.creamDim,
              letterSpacing: '0.5em',
              paddingLeft: '0.5em',
            }}>
              {item.area}
            </div>

            {/* Location */}
            <div style={{ marginTop: '2.5mm' }}>
              <PMono size={8.5} color={PRINT.gold} track="0.3em" weight={600}>
                {isEgg ? '隱蛋 · 找到才出現' : item.loc}
              </PMono>
            </div>
          </div>

          {/* ── QR CODE (real, scannable) ── */}
          <div style={{
            position: 'absolute', top: '120mm', left: '50%',
            transform: 'translateX(-50%)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4mm',
          }}>
            <RealQR url={item.url} sizeMm={86} />

            {/* Scan CTA */}
            <div style={{ textAlign: 'center', marginTop: '1mm' }}>
              <PMono size={12} color={PRINT.gold} track="0.42em" weight={700}>
                SCAN TO STAMP
              </PMono>
              <div style={{ marginTop: '1.5mm' }}>
                <PMono size={9.5} color={PRINT.creamMute} track="0.22em" weight={400}>
                  掃碼蓋章 · 集滿 8 枚參加抽獎
                </PMono>
              </div>
            </div>
          </div>

          {/* ── Station ID + copy ── */}
          <div style={{
            position: 'absolute', bottom: '24mm', left: '12mm', right: '12mm',
            textAlign: 'center',
          }}>
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: '5mm',
              marginBottom: '3.5mm',
            }}>
              <div style={{ width: '14mm', height: '0.8pt', background: PRINT.goldDim }} />
              <PMono size={10} color={PRINT.gold} track="0.5em" weight={700}>
                {numDisplay}
              </PMono>
              <div style={{ width: '14mm', height: '0.8pt', background: PRINT.goldDim }} />
            </div>

            <p style={{
              margin: 0,
              fontFamily: "'Noto Serif TC',serif",
              fontSize: '14pt', lineHeight: 2.0, letterSpacing: '0.1em',
              color: PRINT.creamDim, fontWeight: 300,
            }}>
              {item.copy}
            </p>
          </div>

          {/* ── Footer ── */}
          <div style={{
            position: 'absolute', bottom: '11mm', left: 0, right: 0,
            textAlign: 'center',
          }}>
            <PMono size={7.5} color={PRINT.creamFaint} track="0.28em" weight={400}>
              {isEgg
                ? '見つけた人へ。 ／ For Those Who Found It.'
                : 'ここで、ひと呼吸。 ／ Pause Here for a Moment.'}
            </PMono>
          </div>

        </PPage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<StandeePage />);
  </script>
</body>
</html>
