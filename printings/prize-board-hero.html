<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>13 · P1 · Hero 主視覺</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/print-common.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="common/print-common.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { PRINT, PPage, PWatermark, PTick, PCoBrand, PillLabel, GoldText, NexusWordmark, PBigQR, PMono } = window.PrintCommon;

    function PrizeHeroPage() {
      return (
        <PPage wMm={210} hMm={297}>
          <PWatermark ch="8" size={1100} color="rgba(196,162,74,0.035)" pos={{ left: '50%', top: '50%' }} />

          <PTick pos={{ top: '8mm', left: '8mm' }} len={12} weight={0.7} />
          <PTick pos={{ top: '8mm', right: '8mm' }} flipX len={12} weight={0.7} />
          <PTick pos={{ bottom: '8mm', left: '8mm' }} flipY len={12} weight={0.7} />
          <PTick pos={{ bottom: '8mm', right: '8mm' }} flipX flipY len={12} weight={0.7} />

          {/* Co-brand */}
          <div style={{ position: 'absolute', top: '14mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PCoBrand height={10} gap={10} />
          </div>

          {/* Invitation pill */}
          <div style={{ position: 'absolute', top: '30mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PillLabel size={7}>PRIVATE INVITATION · 八週年邀請</PillLabel>
          </div>

          {/* Hero title */}
          <div style={{ position: 'absolute', top: '40mm', left: 0, right: 0, textAlign: 'center' }}>
            <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '52pt', fontStyle: 'italic', color: PRINT.brown, fontWeight: 400, letterSpacing: '0.02em', lineHeight: 1.05 }}>
              Nexus <span style={{ fontStyle: 'italic' }}>Life.</span>
            </div>
            <div style={{ marginTop: 6 }}>
              <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '12pt', color: PRINT.brown, letterSpacing: '0.42em', fontWeight: 300, paddingLeft: '0.42em' }}>
                無 限 日 常　∞　連 結 生 活
              </span>
            </div>
          </div>

          {/* Hero ∞ stamp */}
          <div style={{ position: 'absolute', top: '78mm', left: '50%', transform: 'translateX(-50%)' }}>
            <div style={{
              width: '94mm', height: '94mm', borderRadius: '50%',
              background: `radial-gradient(circle at 30% 25%, ${PRINT.paperLt} 0%, ${PRINT.paper} 60%, ${PRINT.paperDim} 100%)`,
              border: `0.8pt solid ${PRINT.goldDim}`,
              boxShadow: 'inset 0 2pt 4pt rgba(255,255,255,0.5), inset 0 -2pt 4pt rgba(58,42,29,0.18), 0 6mm 24mm -6mm rgba(0,0,0,0.65)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              position: 'relative', overflow: 'hidden',
            }}>
              <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', opacity: 0.5, backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.1' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E")`, mixBlendMode: 'multiply' }} />
              <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '300pt', lineHeight: 0.8, color: PRINT.brown, fontStyle: 'italic', letterSpacing: '-0.06em', fontWeight: 400, position: 'relative', textShadow: '0 1pt 0 rgba(255,255,255,0.4)' }}>∞</div>
              <div style={{ position: 'absolute', inset: '8mm', borderRadius: '50%', border: `0.5pt dashed rgba(196,162,74,0.45)`, pointerEvents: 'none' }} />
            </div>
            <PTick pos={{ top: '-3mm', left: '-3mm' }} len={12} color={PRINT.gold} opacity={0.85} weight={0.8} />
            <PTick pos={{ top: '-3mm', right: '-3mm' }} len={12} color={PRINT.gold} opacity={0.85} flipX weight={0.8} />
            <PTick pos={{ bottom: '-3mm', left: '-3mm' }} len={12} color={PRINT.gold} opacity={0.85} flipY weight={0.8} />
            <PTick pos={{ bottom: '-3mm', right: '-3mm' }} len={12} color={PRINT.gold} opacity={0.85} flipX flipY weight={0.8} />
          </div>

          {/* Hero message */}
          <div style={{ position: 'absolute', top: '188mm', left: 0, right: 0, textAlign: 'center' }}>
            <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '22pt', lineHeight: 1.55, letterSpacing: '0.1em', color: PRINT.brown, fontWeight: 400 }}>
              用 <GoldText style={{ fontWeight: 600 }}>8 天</GoldText>，把一個紀念日<br/>
              <span style={{ fontStyle: 'italic', color: PRINT.gold, fontWeight: 500 }}>過完整</span>。
            </p>
          </div>

          {/* 3 modules row */}
          <div style={{ position: 'absolute', top: '232mm', left: '16mm', right: '16mm', display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0, borderTop: `0.5pt solid ${PRINT.goldDim}`, borderBottom: `0.5pt solid ${PRINT.goldDim}`, padding: '6mm 0' }}>
            {[
              { en: 'Daily Ritual',  zh: '每日專屬儀式' },
              { en: 'Mark Journal',  zh: '集印探索'     },
              { en: 'Infinity Day',  zh: '加碼抽獎'     },
            ].map((m, i) => (
              <div key={m.en} style={{ textAlign: 'center', borderLeft: i === 0 ? 'none' : `0.4pt solid ${PRINT.goldFaint}`, padding: '0 4mm' }}>
                <div><span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '14pt', fontStyle: 'italic', color: PRINT.gold, fontWeight: 500, letterSpacing: '0.04em' }}>{m.en}</span></div>
                <div style={{ marginTop: 3 }}><span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '11pt', color: PRINT.brown, letterSpacing: '0.2em', fontWeight: 400 }}>{m.zh}</span></div>
              </div>
            ))}
          </div>

          {/* Grand prize strip */}
          <div style={{ position: 'absolute', top: '258mm', left: '16mm', right: '16mm', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <PMono size={6} color={PRINT.gold} track="0.4em" weight={700}>GRAND PRIZE WEEK</PMono>
              <div style={{ marginTop: 2 }}>
                <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '11pt', color: PRINT.brown, letterSpacing: '0.06em', fontWeight: 500 }}>5 / 24 — 5 / 31</span>
                <span style={{ color: PRINT.brown, fontSize: '8pt', marginLeft: 6, letterSpacing: '0.1em' }}>每日 20:00 抽出</span>
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <PMono size={6} color={PRINT.creamFaint} track="0.4em" weight={600}>EVENT PERIOD</PMono>
              <div style={{ marginTop: 2 }}>
                <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '11pt', color: PRINT.brown, letterSpacing: '0.06em', fontWeight: 500 }}>2026.04.25 — 05.31</span>
              </div>
            </div>
          </div>

          {/* Footer */}
          <div style={{ position: 'absolute', bottom: '12mm', left: '16mm', right: '16mm', display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', borderTop: `0.4pt solid ${PRINT.goldMute}`, paddingTop: 6 }}>
            <NexusWordmark width={130} align="left" />
            <PBigQR size="20mm" seed={777} />
          </div>
        </PPage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PrizeHeroPage />);
  </script>
</body>
</html>
