<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>16 · B 面 · 咖啡 - 桌面卡 A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/print-common.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="common/print-common.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { PRINT, PPage, PWatermark, PTick, PCoBrand, PillLabel, GoldText, PBigQR, PMono } = window.PrintCommon;

    function TableCardABack() {
      return (
        <PPage wMm={105} hMm={148}>
          <PWatermark ch="咖啡" size={170} color="rgba(196,162,74,0.022)" pos={{ left: '50%', top: '50%' }} />

          <PTick pos={{ top: '6mm', left: '6mm' }} len={6} weight={0.6} />
          <PTick pos={{ top: '6mm', right: '6mm' }} flipX len={6} weight={0.6} />
          <PTick pos={{ bottom: '6mm', left: '6mm' }} flipY len={6} weight={0.6} />
          <PTick pos={{ bottom: '6mm', right: '6mm' }} flipX flipY len={6} weight={0.6} />

          {/* Co-brand */}
          <div style={{ position: 'absolute', top: '10mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PCoBrand height={7.5} gap={7} />
          </div>

          {/* Menu Title */}
          <div style={{ position: 'absolute', top: '22mm', left: '10mm', right: '10mm', textAlign: 'center' }}>
            <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '13pt', color: PRINT.brown, fontWeight: 500, letterSpacing: '0.1em' }}>
              WIRED TOKYO
            </span>
            <div style={{ marginTop: 2 }}>
              <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '8pt', fontStyle: 'italic', color: PRINT.brown, letterSpacing: '0.06em' }}>
                Coffee & Relax
              </span>
            </div>
          </div>

          {/* QR */}
          <div style={{ position: 'absolute', top: '44mm', left: '50%', transform: 'translateX(-50%)' }}>
            <PBigQR size="46mm" seed={101} />
          </div>

          {/* Poem Copy */}
          <div style={{ position: 'absolute', top: '98mm', left: '10mm', right: '10mm', textAlign: 'center' }}>
            <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '8.5pt', lineHeight: 1.8, color: PRINT.brown, letterSpacing: '0.08em', fontWeight: 300 }}>
              咖啡不是必需，但那一刻的空白是。<br/>
              在這裡，用一杯暖熱，把時間拉長。
            </p>
          </div>

          {/* Special discount callout */}
          <div style={{ position: 'absolute', bottom: '15mm', left: 0, right: 0, textAlign: 'center' }}>
            <PMono size={6.5} color={PRINT.gold} track="0.26em" weight={700}>ANNIVERSARY SPECIAL ‧ 憑券享 8 折優惠</PMono>
          </div>

          {/* Bottom margin info */}
          <div style={{ position: 'absolute', bottom: '8mm', left: '10mm', right: '10mm', display: 'flex', justifyContent: 'space-between', borderTop: `0.4pt solid ${PRINT.goldFaint}`, paddingTop: 3 }}>
            <PMono size={5.5} color={PRINT.creamFaint} track="0.2em">NEXUS.LIFE</PMono>
            <PMono size={5.5} color={PRINT.creamFaint} track="0.2em">TABLE CARD 01</PMono>
          </div>
        </PPage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TableCardABack />);
  </script>
</body>
</html>
