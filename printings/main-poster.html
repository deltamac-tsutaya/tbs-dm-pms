<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>23 · P1 · A4 實體海報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/print-common.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="common/print-common.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { PRINT, PPage, PWatermark, PTick, PCoBrand, PillLabel, GoldText, InfinityBadge, PMono, PRule } = window.PrintCommon;

    function MainPosterPage() {
      return (
        <PPage wMm={210} hMm={297}>
          <PWatermark ch="8" size={1100} color="rgba(196,162,74,0.025)" pos={{ left: '50%', top: '50%' }} />

          <PTick pos={{ top: '8mm', left: '8mm' }} len={12} weight={0.7} />
          <PTick pos={{ top: '8mm', right: '8mm' }} flipX len={12} weight={0.7} />
          <PTick pos={{ bottom: '8mm', left: '8mm' }} flipY len={12} weight={0.7} />
          <PTick pos={{ bottom: '8mm', right: '8mm' }} flipX flipY len={12} weight={0.7} />

          {/* Co-brand */}
          <div style={{ position: 'absolute', top: '16mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PCoBrand height={11} gap={10} />
          </div>

          {/* Pill */}
          <div style={{ position: 'absolute', top: '32mm', left: 0, right: 0, display: 'flex', justifyContent: 'center' }}>
            <PillLabel size={7.5}>8TH ANNIVERSARY ‧ 八週年特別企劃</PillLabel>
          </div>

          {/* Title */}
          <div style={{ position: 'absolute', top: '44mm', left: 0, right: 0, textAlign: 'center' }}>
            <h1 style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '46pt', fontWeight: 300, color: PRINT.brown, letterSpacing: '0.12em', lineHeight: 1.25 }}>
              無限日常　<span style={{ fontStyle: 'italic', fontFamily: "'Noto Serif TC',serif", color: PRINT.gold }}>∞</span><br/>連結生活
            </h1>
            <div style={{ marginTop: 8 }}>
              <PMono size={8.5} color={PRINT.goldDim} track="0.45em">NEXUS LIFE ‧ TSUTAYA BOOKSTORE</PMono>
            </div>
          </div>

          {/* Large decorative Infinity */}
          <div style={{ position: 'absolute', top: '106mm', left: '50%', transform: 'translateX(-50%)', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            <InfinityBadge size={140} fg={PRINT.gold} accent={PRINT.gold} stroke={0.8} />
          </div>

          {/* Hero slogan */}
          <div style={{ position: 'absolute', top: '168mm', left: 0, right: 0, textAlign: 'center' }}>
            <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '18pt', lineHeight: 1.6, letterSpacing: '0.16em', color: PRINT.brown, fontWeight: 300 }}>
              用 <GoldText style={{ fontWeight: 500 }}>8 天</GoldText> 的時間，<br/>
              把一個紀念日過得完整。
            </p>
          </div>

          {/* 3 modules list */}
          <div style={{ position: 'absolute', top: '206mm', left: '24mm', right: '24mm' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <PMono size={7.5} color={PRINT.gold} track="0.36em" weight={700}>THREE WAYS TO JOIN ‧ 參與方式</PMono>
              <PRule width="auto" style={{ flex: 1 }} color={PRINT.goldFaint} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
              {[
                { n: '01', title: '每日專屬儀式', desc: '點亮日常，獲得抽獎券' },
                { n: '02', title: '集印探索', desc: '館內集章，解鎖地圖' },
                { n: '03', title: '加碼大獎', desc: '每日 20:00 抽和牛套餐' },
              ].map(item => (
                <div key={item.n} style={{ borderLeft: `0.5pt solid ${PRINT.goldDim}`, paddingLeft: 8 }}>
                  <PMono size={7} color={PRINT.gold} track="0.2em" weight={700}>NO.{item.n}</PMono>
                  <div style={{ marginTop: 2 }}>
                    <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '10.5pt', color: PRINT.brown, fontWeight: 500 }}>{item.title}</span>
                  </div>
                  <p style={{ margin: '3pt 0 0', fontFamily: "'Noto Sans TC',sans-serif", fontSize: '7pt', lineHeight: 1.6, color: PRINT.brown }}>{item.desc}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Footer block */}
          <div style={{ position: 'absolute', bottom: '16mm', left: '24mm', right: '24mm', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', borderTop: `0.5pt solid ${PRINT.goldDim}`, paddingTop: 10 }}>
            <div>
              <PMono size={6} color={PRINT.creamFaint} track="0.3em" weight={600}>EVENT PERIOD</PMono>
              <div style={{ marginTop: 2 }}>
                <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '12pt', color: PRINT.brown, fontWeight: 500, letterSpacing: '0.08em' }}>2026.04.25 — 05.31</span>
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <PMono size={6} color={PRINT.creamFaint} track="0.3em" weight={600}>LOCATION</PMono>
              <div style={{ marginTop: 2 }}>
                <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '12pt', color: PRINT.brown, fontWeight: 500, letterSpacing: '0.08em' }}>台中市政店</span>
              </div>
            </div>
          </div>
        </PPage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MainPosterPage />);
  </script>
</body>
</html>
