<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>12 · 櫃檯說明立卡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/print-common.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="common/print-common.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { PRINT, PPage, PWatermark, PTick, PCoBrand, PMono, PRule, PNexusMark, InfinityBadge, GoldText, PBigQR } = window.PrintCommon;

    function CounterCardPage() {
      return (
        <PPage wMm={210} hMm={297}>
          <PWatermark ch="∞" size={780} color="rgba(168,132,56,0.05)" pos={{ left: '52%', top: '52%' }} italic />

          <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 50% 35%, rgba(212,168,67,0.04) 0%, transparent 60%)', pointerEvents: 'none' }} />
          <div style={{ position: 'absolute', inset: '8mm', border: `0.6pt solid rgba(212,168,67,0.2)` }} />
          <PTick pos={{ top: '8mm', left: '8mm' }} len={10} />
          <PTick pos={{ top: '8mm', right: '8mm' }} flipX len={10} />
          <PTick pos={{ bottom: '8mm', left: '8mm' }} flipY len={10} />
          <PTick pos={{ bottom: '8mm', right: '8mm' }} flipX flipY len={10} />

          {/* Header */}
          <div style={{ position: 'absolute', top: '14mm', left: '14mm', right: '14mm', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <PCoBrand height={11} />
            <PMono size={7} color={PRINT.gold} track="0.36em" weight={700}>2026.04.25 — 05.31</PMono>
          </div>
          <div style={{ position: 'absolute', top: '21mm', left: '14mm', right: '14mm', height: 0.5, background: 'rgba(212,168,67,0.22)' }} />

          {/* Eyebrow */}
          <div style={{ position: 'absolute', top: '26mm', left: '14mm', display: 'flex', alignItems: 'center', gap: 8 }}>
            <PRule width="8mm" color={PRINT.gold} height={1} />
            <PMono size={7} color={PRINT.brown} track="0.36em" weight={600}>COUNTER INFO · 櫃檯說明 · 台中市政店</PMono>
          </div>

          {/* Nexus Life mark */}
          <div style={{ position: 'absolute', top: '34mm', left: '14mm' }}>
            <PNexusMark size={2.0} align="left" />
          </div>

          {/* Infinity badge + tagline */}
          <div style={{ position: 'absolute', top: '70mm', left: '14mm', display: 'flex', alignItems: 'center', gap: 12 }}>
            <InfinityBadge size={42} fg={PRINT.gold} accent={PRINT.gold} stroke={1.0} />
            <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '13pt', color: PRINT.brown, letterSpacing: '0.32em', fontWeight: 300 }}>
              無限日常　∞　連結生活
            </span>
          </div>

          {/* Hero quote */}
          <div style={{ position: 'absolute', top: '88mm', left: '14mm', right: '14mm' }}>
            <p style={{ margin: 0, fontFamily: "'Noto Serif TC',serif", fontSize: '22pt', lineHeight: 1.5, letterSpacing: '0.06em', color: PRINT.brown, fontWeight: 400 }}>
              用 <GoldText style={{ fontWeight: 600 }}>8 天</GoldText>，<br/>
              把一個紀念日<span style={{ fontStyle: 'italic', fontFamily: "'Noto Serif TC',serif", color: PRINT.gold }}>過完整</span>。
            </p>
          </div>

          {/* 3 modules */}
          <div style={{ position: 'absolute', top: '134mm', left: '14mm', right: '14mm' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
              <PMono size={7} color={PRINT.gold} track="0.36em" weight={700}>THREE MODULES · 三大模組</PMono>
              <PRule width="auto" style={{ flex: 1 }} color={PRINT.goldFaint} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, marginTop: 8 }}>
              {[
                { n: '01', tag: 'DAILY RITUAL', zh: '每日專屬儀式', desc: '每日完成儀式，獲得 Infinity Day 抽獎券' },
                { n: '02', tag: 'MARK JOURNAL', zh: '集印探索',     desc: '館內掃描 8 個主路點位印章，解鎖當日抽獎' },
                { n: '03', tag: 'INFINITY DAY', zh: '加碼抽獎',     desc: '每日抽 1 次，券越多機率越高' },
              ].map(m => (
                <div key={m.n} style={{ border: '0.5pt solid rgba(212,168,67,0.22)', background: 'rgba(212,168,67,0.025)', padding: '5mm 4.5mm', minHeight: '40mm' }}>
                  <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '22pt', fontWeight: 500, lineHeight: 1, letterSpacing: '-0.02em' }}>
                    <GoldText>{m.n}</GoldText>
                  </div>
                  <div style={{ marginTop: 5 }}><PMono size={6} color={PRINT.gold} track="0.3em" weight={700}>{m.tag}</PMono></div>
                  <div style={{ marginTop: 3 }}>
                    <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '12pt', color: PRINT.brown, letterSpacing: '0.08em', fontWeight: 400 }}>{m.zh}</span>
                  </div>
                  <p style={{ margin: '4mm 0 0', fontFamily: "'Noto Sans TC',sans-serif", fontSize: '7.5pt', lineHeight: 1.7, color: PRINT.brown, letterSpacing: '0.04em' }}>{m.desc}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Grand prize callout */}
          <div style={{ position: 'absolute', top: '196mm', left: '14mm', right: '14mm', background: `linear-gradient(160deg, rgba(212,168,67,0.1) 0%, rgba(212,168,67,0.04) 100%)`, border: '0.6pt solid rgba(212,168,67,0.35)', padding: '8mm 8mm', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', right: -8, top: -16, fontFamily: "'Noto Serif TC',serif", fontSize: '110pt', color: 'rgba(168,132,56,0.07)', lineHeight: 0.8, fontStyle: 'italic' }}>∞</div>
            <div style={{ display: 'flex', gap: 10, position: 'relative' }}>
              <div style={{ flex: 1 }}>
                <PMono size={6.5} color={PRINT.goldDim} track="0.36em" weight={700}>GRAND PRIZE WEEK · 大獎週</PMono>
                <div style={{ marginTop: 4 }}>
                  <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '19pt', color: PRINT.brown, letterSpacing: '0.06em', fontWeight: 500 }}>日本和牛牛排雙人套餐</span>
                </div>
                <div style={{ marginTop: 1 }}>
                  <span style={{ fontFamily: "'Noto Serif TC',serif", fontStyle: 'italic', fontSize: '10pt', color: PRINT.brown, letterSpacing: '0.02em' }}>日本和牛ステーキ ペアセット · WIRED TOKYO</span>
                </div>
                <div style={{ marginTop: 5 }}>
                  <PMono size={7} color={PRINT.gold} track="0.28em" weight={500}>5 / 24 — 5 / 31 ‧ 每日 20:00 抽出 ‧ 共 8 份 ‧ NT$ 2,300</PMono>
                </div>
              </div>
              <div style={{ flexShrink: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3 }}>
                <PBigQR size="24mm" seed={111} />
                <PMono size={5} color={PRINT.goldDim} track="0.28em">SCAN TO JOIN</PMono>
              </div>
            </div>
          </div>

          {/* Footer */}
          <div style={{ position: 'absolute', bottom: '14mm', left: '14mm', right: '14mm', borderTop: '0.5pt solid rgba(212,168,67,0.22)', paddingTop: 6, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
            <div>
              <PMono size={6} color={PRINT.creamFaint} track="0.3em" weight={600}>LOCATION</PMono>
              <div style={{ marginTop: 1 }}>
                <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: '11pt', color: PRINT.brown, letterSpacing: '0.08em' }}>台中市政店 ‧ 4F</span>
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <PMono size={6} color={PRINT.creamFaint} track="0.3em" weight={600}>EVENT PERIOD</PMono>
              <div style={{ marginTop: 1 }}><PMono size={8} color={PRINT.gold} track="0.3em" weight={700}>NEXUS.LIFE · 8TH</PMono></div>
            </div>
          </div>
        </PPage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CounterCardPage />);
  </script>
</body>
</html>
