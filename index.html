<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="得利蔦屋">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23000' width='192' height='192'/><text x='5' y='185' font-size='155' font-family='serif' fill='white' text-anchor='start'>蔦</text><text x='188' y='44' font-size='40' font-family='sans-serif' font-weight='700' fill='white' text-anchor='end'>DM</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180' rx='40'/><text x='5' y='174' font-size='145' font-family='serif' fill='white' text-anchor='start'>蔦</text><text x='176' y='42' font-size='38' font-family='sans-serif' font-weight='700' fill='white' text-anchor='end'>DM</text></svg>">
    <title>得利蔦屋-管理系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:             #F8F7F2;
            --surface:        #ffffff;
            --outline:        #e5e7eb;
            --on-bg:          #1f2937;
            --on-surface-var: #64748b;
            --primary:        #2563eb;
            --primary-light:  #dbeafe;
            --success:        #10b981;
            --success-light:  #dcfce7;
            --taichung:       #10b981;
            --xinyi:          #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--on-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--outline);
            padding-top: max(14px, env(safe-area-inset-top));
            padding-bottom: 14px;
            padding-left: 16px;
            padding-right: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo {
            width: 30px; height: 30px;
            background: #000;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Noto Serif TC', serif;
            font-size: 17px; font-weight: 700;
            color: #fff;
        }
        .header-title { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }

        /* ── Store selector ── */
        .store-bar {
            background: var(--surface);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 9px 16px;
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .store-pill {
            padding: 5px 16px;
            border-radius: 20px;
            border: 1px solid transparent;
            background: rgba(0,0,0,0.04);
            font-size: 12px; font-weight: 700;
            color: var(--on-surface-var);
            cursor: pointer;
            transition: all 0.18s;
        }
        .store-pill.active.taichung { background: var(--taichung); color: #fff; box-shadow: 0 3px 10px rgba(16,185,129,.28); }
        .store-pill.active.xinyi    { background: var(--xinyi);    color: #fff; box-shadow: 0 3px 10px rgba(37,99,235,.28); }

        /* ── Scrollable content ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: calc(68px + env(safe-area-inset-bottom));
        }

        .page { display: none; }
        .page.active { display: block; }

        /* ── Today page ── */
        .today-hero {
            background: var(--surface);
            border-bottom: 1px solid var(--outline);
            padding: 20px 20px 18px;
        }
        .today-label {
            font-size: 11px; font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .today-date {
            font-family: 'Noto Serif TC', serif;
            font-size: 28px; font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.5px;
        }
        .today-weekday {
            font-size: 14px; color: var(--on-surface-var);
            margin-top: 4px; font-weight: 500;
        }

        /* Mini week strip */
        .week-strip {
            display: flex;
            gap: 6px;
            padding: 12px 16px 10px;
            background: var(--surface);
            border-bottom: 1px solid var(--outline);
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .week-strip::-webkit-scrollbar { display: none; }
        .week-day-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            flex-shrink: 0;
            width: 38px;
        }
        .wdi-label { font-size: 10px; font-weight: 700; color: var(--on-surface-var); }
        .wdi-num {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600;
            color: var(--on-bg);
            transition: background 0.15s;
        }
        .wdi-num:hover { background: var(--bg); }
        .wdi-num.today { background: var(--primary); color: #fff; font-weight: 700; }
        .wdi-num.selected:not(.today) { background: var(--primary-light); color: var(--primary); font-weight: 700; }

        /* Agenda section */
        .agenda-wrap {
            padding: 16px;
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .agenda-section-title {
            font-size: 11px; font-weight: 700;
            color: var(--on-surface-var);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .card {
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--outline);
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px 0 20px;
            color: var(--on-surface-var);
        }
        .empty-icon { font-size: 30px; opacity: 0.45; }
        .empty-text { font-size: 13px; text-align: center; line-height: 1.5; }
        .planning-badge {
            font-size: 10px; font-weight: 700;
            background: var(--bg);
            border: 1px solid var(--outline);
            border-radius: 20px;
            padding: 3px 10px;
            color: var(--on-surface-var);
        }

        /* ── Calendar (month) page ── */
        .cal-page-wrap {
            padding: 16px;
            max-width: 680px;
            margin: 0 auto;
        }
        .cal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .cal-nav-btn {
            width: 32px; height: 32px;
            border: 1px solid var(--outline);
            border-radius: 8px;
            background: var(--surface);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--on-surface-var);
            transition: background 0.15s;
        }
        .cal-nav-btn:hover { background: var(--bg); }
        .cal-nav-btn svg { width: 16px; height: 16px; }
        .cal-month-label { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        .cal-hdr {
            text-align: center;
            font-size: 11px; font-weight: 700;
            color: var(--on-surface-var);
            padding: 4px 0 8px;
        }
        .cal-day {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 13px; font-weight: 500;
            color: var(--on-bg);
            transition: background 0.12s;
            gap: 3px;
        }
        .cal-day:hover { background: rgba(0,0,0,0.04); }
        .cal-day.empty { cursor: default; pointer-events: none; }
        .cal-day.today { background: var(--primary); color: #fff; font-weight: 700; }
        .cal-day.today:hover { background: #1d4ed8; }
        .cal-day.selected:not(.today) { background: var(--primary-light); color: var(--primary); font-weight: 700; }

        /* ── Tools page ── */
        .tools-wrap {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .tools-section-title {
            font-size: 11px; font-weight: 700;
            color: var(--on-surface-var);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .tool-card {
            background: var(--surface);
            border: 1px solid var(--outline);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: default;
            color: inherit;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        /* .tool-card hover reserved for when links are wired up */
        .tool-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .tool-icon.green { background: var(--success-light); }
        .tool-icon.blue  { background: var(--primary-light); }
        .tool-icon.gray  { background: #f3f4f6; }
        .tool-info { flex: 1; min-width: 0; }
        .tool-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
        .tool-desc { font-size: 12px; color: var(--on-surface-var); line-height: 1.4; }
        .tool-arrow { color: var(--on-surface-var); flex-shrink: 0; }
        .tool-arrow svg { width: 18px; height: 18px; }

        /* ── Settings page ── */
        .settings-wrap {
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--outline);
            font-size: 13px;
        }
        .settings-row:last-child { border-bottom: none; }
        .settings-label { color: var(--on-surface-var); }
        .settings-val { font-weight: 600; }

        /* ── Bottom Nav ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid var(--outline);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 200;
        }
        .nav-btn {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            padding: 10px 4px;
            border: none; background: none;
            cursor: pointer;
            color: var(--on-surface-var);
            font-size: 10px; font-weight: 600;
            transition: color 0.15s;
        }
        .nav-btn svg { width: 22px; height: 22px; }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">蔦</div>
            <div class="header-title">得利蔦屋 管理系統</div>
        </div>
    </header>

    <!-- Store selector -->
    <div class="store-bar">
        <button id="pillTaichung" class="store-pill active taichung" onclick="switchStore('taichung')">台中市政店</button>
        <button id="pillXinyi"    class="store-pill xinyi"           onclick="switchStore('xinyi')">信義店</button>
    </div>

    <!-- Pages -->
    <div class="content">

        <!-- ── Today page ── -->
        <section id="pageToday" class="page active">

            <!-- Hero date block -->
            <div class="today-hero">
                <div class="today-label">TODAY</div>
                <div class="today-date" id="todayDate"></div>
                <div class="today-weekday" id="todayWeekday"></div>
            </div>

            <!-- Week strip -->
            <div class="week-strip" id="weekStrip"></div>

            <!-- Agenda -->
            <div class="agenda-wrap">
                <div class="agenda-section-title">當日摘要</div>

                <div class="card">
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-text">當日事件尚未串接</div>
                        <div class="planning-badge">規劃中</div>
                    </div>
                </div>

                <div class="agenda-section-title">展區預約</div>
                <div class="card">
                    <div class="empty-state">
                        <div class="empty-icon">🗓</div>
                        <div class="empty-text">展區排程資料尚未串接</div>
                        <div class="planning-badge">規劃中</div>
                    </div>
                </div>

                <div class="agenda-section-title">人力班表</div>
                <div class="card">
                    <div class="empty-state">
                        <div class="empty-icon">👥</div>
                        <div class="empty-text">人力資料尚未串接</div>
                        <div class="planning-badge">規劃中</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ── Calendar (month view) page ── -->
        <section id="pageCalendar" class="page">
            <div class="cal-page-wrap">
                <div class="card">
                    <div class="cal-nav">
                        <button class="cal-nav-btn" onclick="shiftMonth(-1)">
                            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <span class="cal-month-label" id="calLabel"></span>
                        <button class="cal-nav-btn" onclick="shiftMonth(1)">
                            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                    <div class="cal-grid" id="calGrid">
                        <div class="cal-hdr">日</div>
                        <div class="cal-hdr">一</div>
                        <div class="cal-hdr">二</div>
                        <div class="cal-hdr">三</div>
                        <div class="cal-hdr">四</div>
                        <div class="cal-hdr">五</div>
                        <div class="cal-hdr">六</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ── Tools page ── -->
        <section id="pageTools" class="page">
            <div class="tools-wrap">
                <div class="tools-section-title">系統工具</div>

                <div class="tool-card">
                    <div class="tool-icon green">👥</div>
                    <div class="tool-info">
                        <div class="tool-name">人力班表系統</div>
                        <div class="tool-desc">查詢員工班表、部門出勤狀況與當日人力配置</div>
                    </div>
                    <div class="planning-badge">規劃中</div>
                </div>

                <div class="tool-card">
                    <div class="tool-icon blue">🗓</div>
                    <div class="tool-info">
                        <div class="tool-name">展區排程系統</div>
                        <div class="tool-desc">管理大型主題平台展區預約、衝突偵測與租金試算</div>
                    </div>
                    <div class="planning-badge">規劃中</div>
                </div>

                <div class="tool-card">
                    <div class="tool-icon gray">⚙️</div>
                    <div class="tool-info">
                        <div class="tool-name">後台管理</div>
                        <div class="tool-desc">上傳班表 Excel、管理員工職稱與系統設定</div>
                    </div>
                    <div class="planning-badge">規劃中</div>
                </div>
            </div>
        </section>

        <!-- ── Settings page ── -->
        <section id="pageSettings" class="page">
            <div class="settings-wrap">
                <div class="card">
                    <div class="settings-row">
                        <span class="settings-label">系統名稱</span>
                        <span class="settings-val">得利蔦屋 管理系統</span>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">版本</span>
                        <span class="settings-val">v1.0</span>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">時區</span>
                        <span class="settings-val">Asia/Taipei (UTC+8)</span>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">PWA 快取</span>
                        <span class="settings-val">management-v1</span>
                    </div>
                </div>
                <div class="card">
                    <div class="settings-row">
                        <span class="settings-label">人力班表系統</span>
                        <span class="planning-badge">規劃中</span>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">展區排程系統</span>
                        <span class="planning-badge">規劃中</span>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
        <button id="navToday" class="nav-btn active" onclick="switchTab('Today')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            今日
        </button>
        <button id="navCalendar" class="nav-btn" onclick="switchTab('Calendar')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            月曆
        </button>
        <button id="navTools" class="nav-btn" onclick="switchTab('Tools')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
            工具
        </button>
        <button id="navSettings" class="nav-btn" onclick="switchTab('Settings')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            設定
        </button>
    </nav>

    <script>
        // ── State ──
        const WEEKDAYS = ['日','一','二','三','四','五','六'];
        let viewYear, viewMonth;
        let selectedCalDate;
        let currentStore = 'taichung';

        // ── Init ──
        (function init() {
            const now = new Date();
            viewYear  = now.getFullYear();
            viewMonth = now.getMonth();
            selectedCalDate = localDateStr(now);

            renderTodayHero(now);
            renderWeekStrip(now);
            renderCalendar();

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        })();

        // ── Tab navigation ──
        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page' + tab).classList.add('active');
            document.getElementById('nav'  + tab).classList.add('active');
        }

        // ── Store selector ──
        function switchStore(store) {
            currentStore = store;
            document.getElementById('pillTaichung').className = 'store-pill' + (store === 'taichung' ? ' active taichung' : '');
            document.getElementById('pillXinyi').className    = 'store-pill' + (store === 'xinyi'    ? ' active xinyi'    : '');
        }

        // ── Today hero ──
        function renderTodayHero(now) {
            const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
            document.getElementById('todayDate').textContent =
                `${now.getMonth()+1} 月 ${now.getDate()} 日`;
            document.getElementById('todayWeekday').textContent =
                `${now.getFullYear()} · 週${WEEKDAYS[now.getDay()]}`;
        }

        // ── Week strip (Mon–Sun of current week) ──
        function renderWeekStrip(now) {
            const strip = document.getElementById('weekStrip');
            strip.innerHTML = '';

            const todayStr = localDateStr(now);
            // Start from Sunday of this week
            const sunday = new Date(now);
            sunday.setDate(now.getDate() - now.getDay());

            for (let i = 0; i < 7; i++) {
                const d = new Date(sunday);
                d.setDate(sunday.getDate() + i);
                const dStr = localDateStr(d);

                const item = document.createElement('div');
                item.className = 'week-day-item';

                const lbl = document.createElement('div');
                lbl.className = 'wdi-label';
                lbl.textContent = WEEKDAYS[d.getDay()];

                const num = document.createElement('div');
                num.className = 'wdi-num';
                if (dStr === todayStr) num.classList.add('today');
                num.textContent = d.getDate();
                num.addEventListener('click', () => jumpToDate(dStr));

                item.appendChild(lbl);
                item.appendChild(num);
                strip.appendChild(item);
            }
        }

        function jumpToDate(dateStr) {
            // Navigate to month calendar on the selected date
            const [y, m] = dateStr.split('-').map(Number);
            viewYear  = y;
            viewMonth = m - 1;
            selectedCalDate = dateStr;
            renderCalendar();
            switchTab('Calendar');
        }

        // ── Monthly calendar ──
        function renderCalendar() {
            document.getElementById('calLabel').textContent =
                `${viewYear} 年 ${String(viewMonth + 1).padStart(2, '0')} 月`;

            const grid = document.getElementById('calGrid');
            const headers = Array.from(grid.querySelectorAll('.cal-hdr'));
            grid.innerHTML = '';
            headers.forEach(h => grid.appendChild(h));

            const firstDow  = new Date(viewYear, viewMonth, 1).getDay();
            const daysInMon = new Date(viewYear, viewMonth + 1, 0).getDate();
            const todayStr  = localDateStr(new Date());

            for (let i = 0; i < firstDow; i++) {
                const el = document.createElement('div');
                el.className = 'cal-day empty';
                grid.appendChild(el);
            }

            for (let d = 1; d <= daysInMon; d++) {
                const dateStr = `${viewYear}-${pad(viewMonth + 1)}-${pad(d)}`;
                const el = document.createElement('div');
                el.className = 'cal-day';
                if (dateStr === todayStr)       el.classList.add('today');
                if (dateStr === selectedCalDate) el.classList.add('selected');
                el.innerHTML = `<span>${d}</span>`;
                el.addEventListener('click', () => {
                    selectedCalDate = dateStr;
                    renderCalendar();
                });
                grid.appendChild(el);
            }
        }

        function shiftMonth(delta) {
            viewMonth += delta;
            if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
            if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
            renderCalendar();
        }

        // ── Utils ──
        function localDateStr(d) {
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        }
        function pad(n) { return String(n).padStart(2, '0'); }
    </script>
</body>
</html>
